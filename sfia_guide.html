جمع وإعداد تقارير البيانات حول أداء المورّدين. يساعد في التواصل اليومي المعتاد بين المؤسسة والمورّدين.", "3": "يكون بمثابة نقطة الاتصال الاعتيادية بين المؤسسة والمورّدين. يقدم الدعم في معالجة الحوادث أو المشاكل أو الأداء غير المُرضي فيما يتعلق بالمورّدين. يجمع ويعد تقارير البيانات حول أداء المورّدين.", "4": "يجمع البيانات الخاصة بأداء المورّدين ويتحرى عن المشاكل. يراقب ويعد التقارير حول أداء المورّدين ورضا العملاء والالتزام بالاشتراطات الأمنية ومتطلبات ذكاء الأعمال. يتحقق من اتفاق أداء المورّدين مع الشروط الواردة بالعقد. يتعاون بشكل استباقي مع المورّدين لمعالجة الحوادث أو المشكلات أو الأداء غير المرضي. ينفذ مبادرات وبرامج تحسين الخدمة المتعلقة بإدارة المورّدين.", "5": "يدير المورّدين للوفاء بمؤشرات الأداء الرئيسية والمستهدفات المتفق عليها. يدير العلاقات التشغيلية بين المورّدين ويضمن تصعيد الخلافات و النزاعات المحتملة وتسويتها. يجري عمليات تقييم الأداء ويستفيد من بيانات أداء المورّدين لضمان مراقبة أداء المورّدين بشكل كاف ومراجعته بانتظام. يستفيد من خبرات المورّدين لدعم وتوجيه خرائط الطريق الخاصة بالتطوير. يدير عملية تنفيذ إجراءات تحسين خدمات المورّدين. يحدد العقب", "6": "يضع السياسات والمعايير والمبادئ التوجيهية المؤسسية لضمان فاعلية إدارة المورِّدين عبر سلسلة التوريد المتكاملة بأكملها. يحدد النهج المستخدم في الاتصالات التجارية وإدارة العلاقات مع المورّدين. يخلق بيئة عمل إيجابية وفعالة مع المورّدين لتحقيق الفائدة المشتركة. يضمن استخدام الموارد والأدوات لإجراء عمليات قياس الأداء. يراجع عملية تحليل المورّدين ويقيّم مدى فاعلية سلسلة التوريدات بالكامل. يدير المخاطر وي", "7": "تحديد استراتيجية إدارة الموردين الشاملة، واعتماد إدارة فعّالة وعلاقات تشغيلية على كافة المستويات. قيادة شراكات الموردين التعاونية. مواءمة أداء الموردين وإدارة العلاقات مع الأهداف التجارية واستراتيجيات التوريد. وضع أطر لحوكمة الموردين ومراقبة الخدمة. ضمان القيمة التجارية من العقود وتمثيل المؤسسة في النزاعات المهمة مع الموردين."}}, {"code": "ITCM", "name": "إدارة العقود", "desc": "إدارة وتشغيل العقود الرسمية، ومعالجة احتياجات الموردين والعملاء في توفير المنتجات والخدمات.", "levels": {"2": "يساعد في جمع بيانات أداء العقد. ينتج تقارير قياسية عن أداء العقد تحت الإشراف الروتيني.", "3": "يعمل كنقطة اتصال روتينية بين المؤسسة والأطراف المقابلة فيما يتعلق بإدارة العقود. يدعم جمع بيانات أداء العقود. ينشئ تقارير قياسية حول أداء العقود.", "4": "يحدد المصادر ويقوم بتجميع البيانات الخاصة بأداء العقود (مثل الأسعار وتكاليف سلسلة التوريد)، ويقوم بمراقبة الأداء وفقاً لمؤشرات الأداء الرئيسية (KPIs). يحدد الأداء المنخفض ويرفع التقارير عنه ويطور الفرص للتحسين. يراقب الامتثال للشروط والأحكام ويتخذ الخطوات المناسبة لمعالجة عدم الامتثال لها. يبادر على نحو استباقي إلى إدارة آليات المخاطرة والمكافأة في العقد. يراقب التقدم في تحقيق أهداف العمل المحددة ", "5": "يشرف على ويقيس مدى استيفاء الالتزامات التعاقدية. يستخدم مؤشرات الأداء الرئيسية (KPIs) لمراقبة وتسجيل الملاحظات على الأداء وتحديد الفرص للتحسين المستمر. يطور استراتيجيات لمعالجة حالات القصور في الأداء وعدم الامتثال، بما في ذلك تطبيق شروط العقد. يحدد المواضع التي تتطلب إجراء تغييرات، ويقوم بتقييم أثرها، ويقدم المشورة لأصحاب المصلحة حول الآثار والعواقب. يتفاوض على التغييرات ويسعى للحصول على الاعتماد ", "6": "التفاوض وحل القضايا التعاقدية، بما في ذلك الفشل في الوفاء بالالتزامات التعاقدية. تعزيز عمليات التحكم في التغيير وقيادة مفاوضات التغيير عند الضرورة. دعم برامج التحسين المستمر، وتطوير الاستراتيجيات والحوافز بشكل مشترك لتعزيز الأداء. إجراء تقييمات مالية شاملة. ضمان العناية الواجبة والتدقيق القانوني لدعم جميع عمليات الشراء، والتأكيد على تقييم المخاطر والامتثال في المشاركات التعاقدية. ضمان توثيق الدروس", "7": "يقود التوجيه الاستراتيجي والحوكمة لعمليات إدارة العقود في جميع أنحاء المؤسسة. يقدم المشورة للقيادة التنفيذية بشأن مخاطر واستراتيجيات إدارة العقود. ينفذ استراتيجيات إدارة العقود بما يتماشى مع أهداف المؤسسة وديناميكيات السوق، بما في ذلك الإشراف على العقود المهمة والمخاطر القانونية المرتبطة بها. يعمل كنقطة تصعيد للنزاعات الكبرى. يعزز التميز التشغيلي في إدارة العقود، ويقود تحسينات وابتكارات عقود سلسلة"}}, {"code": "RLMT", "name": "إدارة العلاقة مع أصحاب المصلحة", "desc": "تحليل وإدارة علاقات أصحاب المصلحة والتأثير عليها بشكل منهجي لتحقيق نتائج مفيدة للطرفين من خلال المشاركة المنظمة.", "levels": {"4": "يعالج المشاكل والإشكاليات، وإدارة القرارات، والإجراءات التصحيحية، والدروس المستفادة، وعمليات جمع ونشر المعلومات ذات الصلة. ينفذ خطط الاتصالات/ المشاركة الخاصة بأصحاب المصلحة. يجمع التغذية الراجعة من العملاء وأصحاب المصلحة ويستخدمها للمساعدة في قياس مدى فاعلية إدارة أصحاب المصلحة. يساعد في تطوير وتعزيز العلاقات بين العملاء وأصحاب المصلحة.", "5": "يقف على الاحتياجات الخاصة بالاتصالات والعلاقات بين مجموعات أصحاب المصلحة. يترجم الاستراتيجيات الخاصة بالاتصالات/ مشاركة أصحاب المصلحة إلى أنشطة وأعمال محددة قابلة للتسليم. يعمل على تيسير التواصل والنقاش المفتوحين بين أصحاب المصلحة. يكون جهة الاتصال الوحيدة عبر تطوير ووضع وتنفيذ استراتيجيات وخطط لإشراك أصحاب المصلحة. يقدم تغذية راجعة مستنيرة لتقييم وتعزيز عملية الفهم. يُسهّل عمليات اتخاذ القرارات ا", "6": "يقود تطوير استراتيجيات وخطط إدارة أصحاب المصلحة الشاملة. ينشئ ويبني علاقات استراتيجية طويلة الأمد مع أصحاب المصلحة الرئيسيين لدعم تقديم الخدمات ومبادرات التغيير. يعمل كنقطة اتصال رئيسية، ويضمن التواصل الفعال والتوافق. يتفاوض ويضمن أن الاتفاقيات تلبي احتياجات أصحاب المصلحة. يشرف على مراقبة علاقات أصحاب المصلحة، والتقاط الدروس المستفادة وتقديم الملاحظات. يقود المبادرات لتعزيز التواصل والعلاقات، وتعز", "7": "يحدد النهج الاستراتيجي لفهم أهداف ومتطلبات أصحاب المصلحة. يعمل مع جميع الجهات المعنية لتحديد أصحاب المصلحة وبناء علاقات فعالة. يضع ويعزز الرؤية العامة الخاصة بكيفية تلبية أهداف أصحاب المصلحة ويحدد الأدوار المؤسسية ومدى اتساقها. يدير بفاعلية العلاقات مع كبار أصحاب المصلحة ويمثل نقطة التصعيد الأخيرة في عملية حل المشكلات."}}, {"code": "CSMG", "name": "دعم خدمة العملاء", "desc": "إدارة وتشغيل خدمة العملاء أو أعمال الخدمات المكتبية.", "levels": {"1": "يستقبل ويتعامل مع استفسارات وطلبات العملاء الروتينية، وفقًا للإجراءات المعمول بها. يسجل تفاعلات العملاء بدقة ويحتفظ بالسجلات ذات الصلة. يرفع القضايا المعقدة إلى أعضاء الفريق أو الأقسام المناسبة.", "2": "الرد على طلبات خدمة العملاء الشائعة، وتوفير المعلومات لتمكين التنفيذ أو الحل. تخصيص المكالمات أو الطلبات أو المشكلات غير المحلولة للوظائف المناسبة. المساهمة في صيانة قواعد المعرفة والوثائق الخاصة بخدمة العملاء. المساعدة في مراقبة مقاييس رضا العملاء.", "3": "يعمل كنقطة اتصال روتينية للعملاء، ويتعامل مع مجموعة واسعة من الاستفسارات وطلبات الخدمة. يقوم بالتحقيق الأولي وتشخيص مشاكل العملاء، وحلها حيثما أمكن أو تصعيدها حسب الحاجة. يساهم في تطوير معايير الخدمة والإجراءات. يساعد في تحليل بيانات أداء الخدمة وتحديد مجالات التحسين.", "4": "يراقب تقديم الخدمة عبر قنوات متعددة ويحلل بيانات الأداء. يساهم في تطوير وتنفيذ معايير وإجراءات الخدمة. يقدم التوجيه الفني والإجرائي لأعضاء الفريق. يحدد الاتجاهات في استفسارات العملاء وقضايا الخدمة، ويوصي بتحسينات العملية. يتعاون مع الإدارات الأخرى لتحسين تجربة العملاء بشكل عام.", "5": "يدير العمليات اليومية لوظيفة خدمة العملاء، بما في ذلك تخطيط الموارد وتخصيص العمل. يطور وينفذ معايير الخدمة والسياسات والإجراءات. يحلل مقاييس الخدمة وردود أفعال العملاء لدفع مبادرات التحسين المستمر. يضمن أن دليل الخدمة شامل وحديث ومتوافق مع أهداف المؤسسة. يطور الأساليب لتعزيز رضا العملاء.", "6": "يشكل الاتجاه الاستراتيجي لخدمة العملاء في جميع أنحاء المؤسسة. يحدد قنوات الخدمة ومستويات الخدمة والمعايير وعملية المراقبة لموظفي خدمة العملاء أو مكتب الخدمة. يدعم ثقافة الخدمة الضرورية لتحقيق النتائج المؤسسية. يقود تطوير وتنفيذ الأطر المؤسسية للشكاوى ومعايير الخدمة والاتفاقيات التشغيلية. يتحمل مسؤولية استمرارية الأعمال والامتثال القانوني والتنظيمي والتعاقدي."}}, {"code": "ADMN", "name": "إدارة الأعمال", "desc": "إدارة وتقديم خدمات ومهام إدارية لتمكين الأفراد والفرق والمؤسسات من النجاح في تحقيق أهدافهم.", "levels": {"1": "يؤدي المهام الإدارية الروتينية في بيئة منظمة. يتبع إجراءات واضحة. يستخدم برامج ومعدات مكتبية شائعة. ينظم المعلومات ويحافظ عليها وفقًا للإجراءات المتفق عليها. يساعد في أنشطة التنسيق الأساسية.", "2": "يساعد في المهام الإدارية لفريق ما. يحافظ على أنظمة تنظيم المعلومات والمستندات. ينسق أنشطة الفريق ويعمل كنقطة اتصال للاتصالات الداخلية والخارجية. يستخدم الأدوات والمنصات الرقمية ذات الصلة.", "3": "يوفر وظيفة الدعم الإداري للفرق والاجتماعات. يشارك بنشاط في مناقشات الفريق. يقوم بإعداد وصيانة أنظمة تنظيم المعلومات والمستندات. يقوم بإعداد التقارير وتوزيعها. يقدم إرشادات حول البرمجيات الإدارية والإجراءات والعمليات والأدوات والآليات.", "4": "يساعد الفرق والمديرين لضمان حصولهم على المعلومات والموارد اللازمة لدعم العمليات الجارية. يساعد في التخطيط للاجتماعات. يتولى الاتصالات والتنظيم بين الوظائف. يقوم بإعداد وتقديم إرشادات مفصلة حول البرمجيات والإجراءات والعمليات والأدوات والآليات الخاصة بالإدارة وإنتاجية مكان العمل. يساهم في تطوير وصيانة السياسات والإجراءات والوثائق المؤسسية.", "5": "يدير عملية تقديم خدمات إدارة الأعمال. يدير ويحدد أولويات الجداول الزمنية واتصالات كبار المديرين وفرق القيادة لضمان الاستخدام الفعال للوقت والموارد. يتعامل مع المعلومات الحساسة والسرية. يضمن حصول المديرين على المعلومات والموارد اللازمة لدعم العمليات الجارية والتغييرات التي يتم إدخالها على العمليات.", "6": "يقود وينسق المبادرات الاستراتيجية التي تعمل عبر الحدود الإدارية أو الوظيفية. يصمم ويخطط وينسق الاجتماعات والأحداث رفيعة المستوى، ويضمن التوافق مع الأهداف الاستراتيجية والنتائج المرجوة. يقدم التوجيه ويتلقى تحديثات التقدم من أعضاء الفريق التنفيذي. يجتمع بشكل جماعي أو فردي مع أعضاء فريق إدارة القيادة لمتابعة نقاط العمل والقضايا والمخاطر. يقدم تقارير عن التقدم المحرز ويحل المشكلات. يدير القضايا والمعل"}}];

const lvlColors = {
  '1':'lp1','2':'lp2','3':'lp3','4':'lp4','5':'lp5','6':'lp6','7':'lp7'
};
const lvlBadge = {
  '1':'background:#e8f5e9;color:#2e7d32',
  '2':'background:#e3f2fd;color:#1565c0',
  '3':'background:#f3e5f5;color:#7b1fa2',
  '4':'background:#fff3e0;color:#e65100',
  '5':'background:#fce4ec;color:#c62828',
  '6':'background:#efebe9;color:#4e342e',
  '7':'background:#e8eaf6;color:#283593'
};

var activeLevel = 'all';

function renderSkills(list){
  var container = document.getElementById('skills-list');
  var noRes = document.getElementById('no-results');
  container.innerHTML = '';
  if(!list.length){ noRes.style.display='block'; return; }
  noRes.style.display='none';

  list.forEach(function(sk, idx){
    var card = document.createElement('div');
    card.className = 'skill-card';
    card.id = 'card-'+idx;

    // Pills
    var pills = Object.keys(sk.levels).map(function(l){
      return '<span class="lvl-pill '+lvlColors[l]+'">'+l+'</span>';
    }).join('');

    // Header
    var header = document.createElement('div');
    header.className = 'skill-header';
    header.innerHTML = 
      '<span class="skill-code">'+sk.code+'</span>'+
      '<div style="flex:1"><div class="skill-name">'+sk.name+'</div>'+
      (sk.desc?'<div class="skill-desc">'+sk.desc.substring(0,100)+(sk.desc.length>100?'...':'')+'</div>':'')+'</div>'+
      '<div class="skill-levels-pills">'+pills+'</div>'+
      '<span class="chevron">▼</span>';
    header.addEventListener('click', function(){ toggleCard(card); });
    card.appendChild(header);

    // Body - levels
    var body = document.createElement('div');
    body.className = 'skill-body';
    Object.keys(sk.levels).forEach(function(l){
      var item = document.createElement('div');
      item.className = 'level-item';
      item.innerHTML = 
        '<div class="level-header">'+
        '<span class="level-badge" style="'+lvlBadge[l]+'">المستوى '+l+'</span>'+
        '</div>'+
        '<div class="level-text">'+sk.levels[l]+'</div>';
      body.appendChild(item);
    });
    card.appendChild(body);

    container.appendChild(card);
  });
}

function toggleCard(card){
  card.classList.toggle('open');
}

function filterSkills(){
  var q = document.getElementById('search').value.trim().toLowerCase();
  var filtered = SKILLS.filter(function(sk){
    var matchSearch = !q || sk.name.toLowerCase().includes(q) || sk.code.toLowerCase().includes(q);
    var matchLevel = activeLevel==='all' || sk.levels[activeLevel];
    return matchSearch && matchLevel;
  });
  renderSkills(filtered);
}

function filterByLevel(lvl, btn){
  activeLevel = lvl;
  document.querySelectorAll('.lvl-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterSkills();
}

// Init
renderSkills(SKILLS);
</script>
</body>
</html>
