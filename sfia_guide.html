<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل مهارات SFIA-9 | عمادة التعلم الإلكتروني</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a3a5c;--primary-light:#2563a0;--accent:#0f8a6d;--accent-light:#e6f7f3;
  --bg:#f0f4f8;--card:#fff;--border:#d1d9e6;--text:#1e2b3a;--muted:#5a6a7a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}

/* Header */
.header{background:linear-gradient(135deg,#1a3a5c 0%,#0d2440 100%);color:#fff;padding:2rem;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(15,138,109,0.15) 0%,transparent 60%);pointer-events:none;}
.header h1{font-size:1.6rem;font-weight:700;margin-bottom:.5rem;position:relative;}
.header p{font-size:.9rem;opacity:.8;position:relative;}
.header-badge{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 14px;font-size:.75rem;margin-bottom:1rem;}

/* Search */
.home-btn{position:fixed;bottom:1.5rem;left:1.5rem;background:#1a3a5c;color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:999;text-decoration:none;transition:all .2s;}
.home-btn:hover{background:#2563a0;transform:translateY(-2px);}
.search-wrap{max-width:500px;margin:1.5rem auto 0;position:relative;}
.search-input{width:100%;padding:12px 45px 12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.9rem;direction:rtl;}
.search-input::placeholder{color:rgba(255,255,255,0.5);}
.search-input:focus{outline:none;border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.6;font-size:1rem;}

/* Container */
.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:1rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--primary);}
.stat-lbl{font-size:.75rem;color:var(--muted);margin-top:2px;}

/* Level filter */
.filter-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem;align-items:center;}
.filter-lbl{font-size:.82rem;color:var(--muted);margin-left:.5rem;}
.lvl-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--text);}
.lvl-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.lvl-btn:hover{border-color:var(--primary);}

/* Skill cards */
.skills-list{display:flex;flex-direction:column;gap:.75rem;}
.skill-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .2s;}
.skill-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}
.skill-header{padding:.9rem 1.1rem;display:flex;align-items:center;gap:.85rem;cursor:pointer;user-select:none;}
.skill-code{background:var(--primary);color:#fff;border-radius:8px;padding:4px 10px;font-size:.72rem;font-weight:600;font-family:monospace;flex-shrink:0;}
.skill-name{font-weight:600;font-size:.9rem;flex:1;}
.skill-desc{font-size:.78rem;color:var(--muted);margin-top:2px;}
.skill-levels-pills{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.lvl-pill{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;}
.lp1{background:#e8f5e9;color:#2e7d32}.lp2{background:#e3f2fd;color:#1565c0}.lp3{background:#f3e5f5;color:#7b1fa2}.lp4{background:#fff3e0;color:#e65100}.lp5{background:#fce4ec;color:#c62828}.lp6{background:#efebe9;color:#4e342e}.lp7{background:#e8eaf6;color:#283593}
.chevron{font-size:.75rem;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.skill-card.open .chevron{transform:rotate(180deg);}

/* Level details */
.skill-body{display:none;border-top:1px solid var(--border);}
.skill-card.open .skill-body{display:block;}
.level-item{padding:.85rem 1.1rem;border-bottom:1px solid #f0f4f8;}
.level-item:last-child{border-bottom:none;}
.level-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;}
.level-badge{padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:600;}
.level-text{font-size:.82rem;line-height:1.7;color:var(--text);}

/* No results */
.no-results{text-align:center;padding:3rem;color:var(--muted);}
.no-results .nr-icon{font-size:3rem;margin-bottom:.75rem;}

/* Responsive */
@media(max-width:580px){.stats{grid-template-columns:1fr 1fr}.stat-card:last-child{grid-column:1/-1}.header h1{font-size:1.2rem}}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">🎓 عمادة التعلم الإلكتروني وتقنية المعلومات</div>
  <h1>📚 الدليل الإرشادي للمهارات</h1>
  <p>إطار مهارات تقنية المعلومات للعصر الرقمي SFIA-9 — النسخة العربية</p>
  <div class="search-wrap">
    <input class="search-input" id="search" placeholder="ابحث عن مهارة بالاسم أو الرمز..." oninput="filterSkills()">
    <span class="search-icon">🔍</span>
  </div>
</div>

<a href="index.html" class="home-btn">🏠 الصفحة الرئيسية</a>
<div class="wrap">
  <div class="stats">
    <div class="stat-card"><div class="stat-num">103</div><div class="stat-lbl">مهارة</div></div>
    <div class="stat-card"><div class="stat-num">7</div><div class="stat-lbl">مستويات إتقان</div></div>
    <div class="stat-card"><div class="stat-num">SFIA-9</div><div class="stat-lbl">الإصدار</div></div>
  </div>

  <div class="filter-row">
    <span class="filter-lbl">فلترة حسب المستوى:</span>
    <button class="lvl-btn active" onclick="filterByLevel('all',this)">الكل</button>
    <button class="lvl-btn" onclick="filterByLevel('1',this)" style="color:#2e7d32;border-color:#c8e6c9;">1</button>
    <button class="lvl-btn" onclick="filterByLevel('2',this)" style="color:#1565c0;border-color:#bbdefb;">2</button>
    <button class="lvl-btn" onclick="filterByLevel('3',this)" style="color:#7b1fa2;border-color:#e1bee7;">3</button>
    <button class="lvl-btn" onclick="filterByLevel('4',this)" style="color:#e65100;border-color:#ffe0b2;">4</button>
    <button class="lvl-btn" onclick="filterByLevel('5',this)" style="color:#c62828;border-color:#ffcdd2;">5</button>
    <button class="lvl-btn" onclick="filterByLevel('6',this)" style="color:#4e342e;border-color:#d7ccc8;">6</button>
    <button class="lvl-btn" onclick="filterByLevel('7',this)" style="color:#283593;border-color:#c5cae9;">7</button>
  </div>

  <div class="skills-list" id="skills-list"></div>
  <div class="no-results" id="no-results" style="display:none">
    <div class="nr-icon">🔎</div>
    <div>لا توجد نتائج مطابقة لبحثك</div>
  </div>
</div>

<script>
const SKILLS = [{"code": "ITSP", "name": "التخطيط الاستراتيجي", "desc": "وضع استراتيجيات وتنفيذها على مستوى المؤسسة لمواءمة خطط العمل الشاملة، وإجراءاته، وموارده مع أهداف العمل رفيعة المستوى.", "levels": {"4": "يساهم في جمع وتحليل المعلومات لدعم عملية وضع الاستراتيجيات. يساعد في وضع التقارير والرؤى الخاصة بالتخطيط الاستراتيجي. يدعم عملية تعريف أصحاب المصلحة المعنيين بالخطط الاستراتيجية ومبادرات التغيير ذات الصلة. يساعد في مراقبة التقدم المحرز في ضوء الأهداف الاستراتيجية المقررة ويقدم تغذية راجعة في هذا الشأن.", "5": "يضاهي المعلومات ويضع تقارير ورؤى لدعم عمليات الإدارة الاستراتيجية. يعمل على إطلاع جميع أصحاب المصلحة بالمنهج المعمول به في الإدارة الاستراتيجية والجداول الزمنية الخاصة بها. يقدم الدعم والتوجيه لمساعدة أصحاب المصلحة في الالتزام بالمنهج المطبق. يضع ويعمم الخطط ليدفع الاستراتيجية للمضي قُدُمًا جنبًا إلى جنب مع عملية التخطيط للتغيير المرتبطة بها. يساهم في تطوير السياسات والمعايير والمبادئ التوجيهية لل", "6": "يضع السياسات والمعايير والمبادئ التوجيهية الخاصة بكيفية قيام المؤسسة بوضع الاستراتيجية والتخطيط لها. يقود ويدير جهود صياغة أو تنقيح استراتيجية تفي بمتطلبات العمل. يطور ويعمم وينفذ ويراجع العمليات التي تعمل على ترسيخ الإدارة الاستراتيجية في إدارة التشغيل الخاصة بالمؤسسة.", "7": "يقود عملية وضع، وتطبيق، وتعميم إطار عمل الإدارة الاستراتيجية للمؤسسة. يدفع نحو صياغة ومراجعة استراتيجية لها."}}, {"code": "ISCO", "name": "تنسيق نظم المعلومات", "desc": "التنسيق ما بين الاستراتيجيات المعلوماتية والاستراتيجيات التكنولوجية في الحالات التي يعود فيها استخدام منهج مشترك بالنفع على المؤسسة.", "levels": {"6": "لديه دراية بالاحتياجات العامة للمؤسسة. يعزز المزايا التي تعود بالنفع على المؤسسة بأكملها نتيجة تبني نهج مشترك لنشر التكنولوجيا. يقوم بالتعاون والتنسيق مع آخرين لتعزيز نظم المعلومات وخدماتها، والحصول عليها، وتطويرها، وتطبيقها.", "7": "يرسخ استراتيجية المؤسسة لإدارة المعلومات ويعمم السياسات والمعايير والإجراءات والطرق الضرورية لتطبيق الاستراتيجية. ينسق كل المسائل المتعلقة بإدارة دورة حياة نظم المعلومات. يمثل مصالح المؤسسة ككل أمام الإدارة العامة والجهات الخارجية، وذلك فيما يخص المسائل المرتبطة بالاستراتيجية المعلوماتية."}}, {"code": "IRMG", "name": "إدارة المعلومات", "desc": "تمكين الإدارة الفعالة واستخدام أصول المعلومات.", "levels": {"3": "يدعم الفرق والأفراد لتحديد وتنظيم أصول المعلومات ومستودعاتها بما يتماشى مع السياسات والممارسات. يجري عمليات بحث روتينية عن المعلومات غير الحساسة اللازمة لدعم عملية اتخاذ القرارات المؤسسية. يدعم المستخدمين للعثور على موارد المعلومات والوصول إليها في ضوء متطلباتهم وحقهم المعتمد في الوصول.", "4": "يتيح للمؤسسة تنظيم ومراقبة واكتشاف الأصول المعلوماتية. يدعم المؤسسة في تحديد وفهرسة وتصنيف أنواع المعلومات ومستودعات المعلومات بما يتماشى مع استراتيجيات وممارسات إدارة المعلومات. يتيح للمستخدمين العثور على المعلومات من خلال الاستخدام المناسب للبيانات الوصفية وأدوات البحث. يقدم النصح والإرشاد للتمكين من تبني ممارسات إدارة المعلومات الجيدة في جميع أنحاء المؤسسة.", "5": "يعمل على تنفيذ سياسات إدارة المعلومات والسجلات والممارسات القياسية. ويقوم بالتعريف بفوائد وقيمة إدارة المعلومات. يخطط لتخزين المعلومات، ومشاركتها ونشرها بشكل فعال داخل المؤسسة. يضع تصنيفا تنظيميا لأصول المعلومات. كما يقدم المشورة والتوجيه القائمين على الخبرة لتمكين المؤسسة من تحقيق أكبر قيمة من الأصول المعلوماتية التي تمتلكها. يقيم القضايا التي قد تمنع المؤسسة من الاستفادة القصوى من أصولها المعلوم", "6": "يقود ويخطط للأنشطة الخاصة بتوصيل وتطبيق استراتيجيات وسياسات إدارة المعلومات. يضع السياسات والمعايير والمبادئ التوجيهية الخاصة بالمؤسسة فيما يتصل بعمليات إدارة المعلومات. يعمل على تحديد المعلومات المطلوبة لدعم المؤسسة. ينشئ عمليات إدارة المعلومات. ينسق ما بين موارد المعلومات التي تم جمعها من مصادر خارجية بهدف تحقيق غايات محددة للأعمال.", "7": "يضع استراتيجية إدارة المعلومات بالمؤسسة ويُعرّف بها. يحدد على المستوى الاستراتيجي المعلومات اللازمة لدعم استراتيجية العمل ووظائفه. يوجه موارد المعلومات بما يخلق قيمة لأصحاب المصلحة. يكون مسؤولاً عن الامتثال للوائح والمعايير ومدونات قواعد الممارسة الجيدة المتصلة بكل مناحي إدارة المعلومات والسجلات."}}, {"code": "STPL", "name": "بنية المؤسسة والأعمال", "desc": "مواءمة الاستراتيجية التكنولوجية لأية مؤسسة مع مهمة العمل والاستراتيجية والعمليات الخاصة بها وتوثيق هذا باستخدام نماذج هيكلية.", "levels": {"5": "يقوم بتطوير النماذج والخطط اللازمة للدفع نحو تنفيذ استراتيجية العمل، والاستفادة من الفرص المتاحة لتحسين أداء العمل. يساهم في إنشاء ومراجعة استراتيجية قدرات الأنظمة التي تلبي المتطلبات الاستراتيجية للشركة. يقوم بإنشاء وصيانة خرائط الطرق لتوجيه تنفيذ استراتيجية العمل وتحسين القدرات. يحدد المتطلبات ويحدد العمليات التجارية الفعالة، من خلال التحسينات في التكنولوجيا أو المعلومات أو ممارسات البيانات أو ا", "6": "تطوير البنية التحتية والعمليات على مستوى المؤسسة لتضمين إدارة التغيير الاستراتيجي داخل المؤسسة. يدفع نحو إنشاء ومراجعة استراتيجية قدرة الأنظمة بما يتماشى مع متطلبات العمل. يضع خرائط الطريق للبنية التحتية والمبادرات المؤسسية، وضمان مشاركة أصحاب المصلحة. يتعرف على اتجاهات السوق والبيئة، واستراتيجيات وأهداف العمل، ويرتبها حسب الأولوية ويحدد الاستراتيجيات البديلة. يضع دراسات جدوى للمبادرات رفيعة المست", "7": "يوجه تطوير البنية التحتية والعمليات على مستوى المشروع لترسيخ التطبيق الاستراتيجي للتغيير في إدارة المؤسسة. يوجه صياغة ومراجعة استراتيجية قدرات المشروع لدعم المتطلبات الاستراتيجية للأعمال. يشرف على إنشاء وتنفيذ خرائط الطريق لتوجيه التحول المؤسسي طويل الأجل والمحاذاة الاستراتيجية. يحدد الفوائد التي تعود على الأعمال بفضل الاستراتيجيات البديلة. يعمل على المواءمة بين استراتيجيات الأعمال وأنشطة التحول ا"}}, {"code": "ARCH", "name": "هندسة الحلول", "desc": "وضع وتعميم هندسة حلول متعددة الأبعاد لتحقيق نتائج العمل المتفق عليها.", "levels": {"4": "يساهم في تطوير البنى الهندسية للحلول في مجال أعمال بعينه أو بنية تحتية أو مجالات وظيفية محددة. يحدد ويقيِّم البنى البديلة والمفاضلات في التكلفة والأداء والقابلية للتوسع. يحدد ويوثق قرارات لها مغزى هيكلي. يضع مواصفات العناصر والمستويات والواجهات القائمة على السحابة أو داخل المباني ليتم ترجمتها إلى تصميمات تفصيلية باستخدام خدمات ومنتجات مختارة. يدعم المشروعات أو مبادرات التغيير من خلال إعداد الخطط ا", "5": "يقود جهود هندسة الحلول في أعمال أو بنية تحتية أو مجالات وظيفية محددة. يقود جهود إعداد الخطط الفنية، ويضمن توافر الموارد الفنية المناسبة. يضمن توفر الأدوات والأساليب المناسبة وفهمها وتوظيفها في تطوير البنى الهندسية للحلول. يقدم المشورة والحوكمة الفنية بشأن وضع الحلول وترسيخها. يُقيّم طلبات التغيير، والخروج على المواصفات، ويقدم توصيات باتخاذ إجراءات محددة. يضمن التطبيق الصحيح للاستراتيجيات والسياسات", "6": "يقود عملية هندسة الحلول المعقدة بما يضمن الوفاء بالاشتراطات المتفق عليها. يضع السياسات والمبادئ والممارسات الخاصة باختيار عناصر هندسة الحلول. يدير عملية الاختيار من بين بدائل ويوازن ما بين متطلبات الإدارة الوظيفية وإدارة جودة الخدمات وإدارة النظم بداخل مجال محدد من مجالات المؤسسة. يعرّف أصحاب المصلحة بالقرارات المقترحة. يقوم بالتنسيق ما بين الهيكل المستهدف في العديد من المشروعات أو المبادرات وإدار"}}, {"code": "INOV", "name": "إدارة الابتكار", "desc": "تحديد الفرص التي توفرها تكنولوجيا المعلومات والاتصالات والتكنولوجيا الرقمية وترتيبها حسب الأولوية وتنميتها واستغلالها.", "levels": {"5": "يدير مسار الابتكار وينفذ العمليات الابتكارية. يطور ويعمل على تطوير وتطويع أدوات الابتكار وعملياته وبناه التحتية لدفع عملية الابتكار قُدُمًا. يحدد الموارد والقدرات اللازمة لدعم الابتكار. يشجع ويحفز جماعات وفرق الابتكار وأفراد المبتكرين على تبادل أفكارهم الإبداعية والتعلم من الإخفاقات. يقوم بإدارة عملية إيصال الأفكار الإبداعية وتدفقها المفتوح بين الأطراف المعنية وإنشاء شبكات وجماعات للابتكار.", "6": "يحقق الالتزام المؤسسي تجاه الابتكار. يعمل على تطوير القدرات المؤسسية لدفع وتعزيز الابتكار. يقود ويخطط لتطوير القدرات الابتكارية وتطبيق وتنفيذ العمليات والأدوات والأطر الابتكارية. يعمل على إيصال الأفكار الإبداعية وتدفقها المفتوح بين الأطراف المعنية وإنشاء شبكات وجماعات للابتكار.", "7": "يدفع نحو تطوير ثقافة تشجع على الابتكار والمخاطرة والتعاون. يدمج عمليات الابتكار في جميع وحدات الأعمال ويربط تنفيذ الاستراتيجية بالابتكار. يوائم بين الأهداف الفردية والمؤسسية والمقاييس والمكافآت من ناحية والابتكار من ناحية أخرى."}}, {"code": "EMRG", "name": "رصد التقنيات الناشئة", "desc": "تحديد وتقييم التقنيات والمنتجات والخدمات والطرق والآليات الجديدة والناشئة.", "levels": {"4": "يدعم مراقبة البيئة الخارجية وتقييم التقنيات الناشئة. يساهم في إعداد التقارير وخرائط الطريق الخاصة بالتكنولوجيا وتبادل المعارف والرؤى.", "5": "يراقب البيئة الخارجية لجمع المعلومات عن التقنيات الناشئة. يقيم ويوثق ما سيترتب عيها من آثار ومخاطر وفرص بالنسبة للمؤسسة. يقوم بإعداد تقارير وخرائط طريق تقنية ويتشارك المعرفة والرؤى مع الآخرين.", "6": "يخطط ويقود أعمال تحديد وتقييم التقنيات الناشئة وما تنطوي عليه من آثار وتهديدات وفرص محتملة. يضع خرائط طريق تقنية تعمل على المواءمة بين الخطط المؤسسية والحلول القائمة على التقنيات الناشئة. يتفاعل مع أصحاب المصلحة المعنيين ويؤثر عليهم في سبيل الحصول على الالتزام المؤسسي باستخدام خرائط الطريق التقنية. يعمل على تطوير مبادئ توجيهية مؤسسية لمراقبة التقنيات الناشئة. يتعاون مع الأطراف الداخلية والخارجية ل"}}, {"code": "RSCH", "name": "البحث الرسمي", "desc": "إنشاء معارف جديدة بصورة منهجية من خلال جمع البيانات والابتكار والتجريب والتقييم والتعميم.", "levels": {"2": "يساعد، ضمن إطار أهداف بحثية محددة، في اختيار الموارد الموثوقة ذات المصداقية والتدقيق فيها. يقوم بالبحث عن المواد ذات الصلة في المواقع والمصادر المتخصصة، ويقرأ المقالات ذات الصلة لتحديث معارفه بمجال عمله. يعد التقارير عن العمل المنجز وقد يقدم إسهامات هامة عالية الجودة في المواد المعدة للنشر. يحتفظ، بموجب التوجيهات الصادرة إليه، بمجموعة شخصية من المواد ذات الصلة.", "3": "يقوم، ضمن إطار أهداف بحثية محددة، بالبناء على الأفكار العامة المناسبة لأغراض البحث وتنقيحها، بما في ذلك التقييم والتطوير والعرض والتنفيذ. يطبق أساليب قياسية لجمع وتحليل البيانات الكمية والنوعية. يعد تقارير بحثية للتعريف بمنهجية ونتائج واستنتاجات البحث. يقدم إسهامات هامة عالية الجودة في المواد المعدة للنشر. يستخدم الموارد المتاحة لتحديث المعرفة في أي مجال من المجالات ذات الصلة ويحتفظ بمجموعة شخصية ", "4": "يبني على الأفكار العامة الملائمة لتقييم الأبحاث وتطويرها وعرضها وتطبيقها وينقح هذه الأفكار. يساهم في وضع الأهداف البحثية ومقترحات التمويل. يجمع ويحلل البيانات النوعية والكمية على النحو المطلوب. يساهم في الخطط البحثية ويحدد الفرص المناسبة لنشر وتعميم نتائج البحوث. يقدم مساهمات فعّالة في الدوائر البحثية. يشارك بأوراق بحثية في المؤتمرات، ويقدم إسهامات هامة عالية الجودة في المواد المعدة للنشر، ويقدم ا", "5": "يوافق على أهداف ومناهج البحث وينفذ المشاريع البحثية بغرض توليد الأفكار الأصيلة. يقوم بجذب وإدارة التمويلات الخارجية للبحوث. ينشئ شبكة علاقات خارجية قوية بالعاملين في مجال تخصصه. يقدم النصح والمشورة حول كيفية إجراء الأبحاث. يختار ويطوع أدوات وتقنيات جمع البيانات. يطور ويستعرض وينتقد أبحاث وأفكار الآخرين نقدًا بنّاء. يقدم عروضًا عملية لما توصلت إليه البحوث من نتائج. يشارك في الأنشطة المهنية التي تُق", "6": "يعمل على تطوير السياسة البحثية للمؤسسة ويشرف على أعمال المهام البحثية. يعمل على تعزيز الأنشطة خارجياً، وجذب وإدارة محافظ كبيرة لتمويل البحوث. يحدد أهداف البحث ويعتمد المقترحات البحثية. يقود المشاريع البحثية الاستراتيجية و/أو متعددة التخصصات. يحافظ على شبكة خارجية قوية تتعدى نطاق تخصصه المباشر ويقوم بدور قيادي في الأنشطة المهنية التي تجري خارج المؤسسة التي بعمل بها. يقدم الأبحاث الهامة في المؤتمرات"}}, {"code": "SUST", "name": "الاستدامة", "desc": "تقديم المشورة وقيادة مبادرات الاستدامة للحد من الأثر البيئي وضمان الامتثال للمعايير واللوائح ذات الصلة.", "levels": {"4": "يتولى تقييم كيفية تأثير مختلف القرارات التكتيكية على الاستدامة المؤسسية ويرفع التقارير بذلك. يقيّم العوامل والمخاطر (السياسية، والتشريعية، والتكنولوجية، والاقتصادية، والاجتماعية) التي تؤثر على العمليات التشغيلية والتوجه الاستراتيجي. يتولى تقييم تنفيذ تدابير الاستدامة في مجالات محددة ويرفع التقارير بذلك.", "5": "يقدم المشورة والتوجيه المستندين إلى الخبرة بشأن تخطيط وتصميم وتنفيذ حلول الاستدامة. يتولى تقييم واختيار طرق وأدوات وممارسات الاستدامة لاستخدامها بما يتماشى مع السياسات والمعايير المتفق عليها. يحدد التحسينات المطلوب إدخالها على نهج المؤسسة تجاه الاستدامة ويقدم التوصيات حيالها.", "6": "يعمل على تطوير وتعزيز الاستراتيجيات والسياسات والمعايير والمبادئ التوجيهية المؤسسية الخاصة بالاستدامة. يبادر إلى إدخال واستخدام تقنيات ومنهجيات وأدوات الاستدامة."}}, {"code": "FMIT", "name": "الإدارة المالية", "desc": "إدارة الاستخدام الفعال والسيطرة على الموارد المالية لدعم استراتيجيات الأعمال والامتثال والتخفيف من المخاطر.", "levels": {"4": "يراقب ويحافظ على السجلات المالية لضمان الوفاء بالاشتراطات الخاصة بالامتثال والتدقيق. يقدم الدعم العام في عمليات التخطيط المالي ووضع الموازنة من خلال تجميع البيانات المالية وإعداد التقارير عنها. يدعم اتخاذ القرار من خلال جمع وتلخيص المعلومات المالية على مستوى عالٍ. يتعاون مع وحدات الأعمال لجمع البيانات المالية وفهم الاحتياجات التشغيلية.", "5": "يقدم النصح والإرشاد العام بشأن التخطيط المالي ووضع الميزانية وأعمال المحاسبة باستخدام الممارسات والمعايير المعترف بها. يطور خططًا وتوقعات مالية رفيعة المستوى لتوجيه الاستراتيجيات والخطط المؤسسية. يراقب الإنفاق لضمان اتفاقه مع أهداف الموازنة. يساهم في وضع أطر الرقابة المالية ويدعم عملية اتخاذ القرارات الاستراتيجية من خلال تلخيص اتجاهات الإنفاق وتنويعاتها.", "6": "يضع السياسات والمعايير والإرشادات المؤسسية للإدارة المالية لدعم أهداف الأعمال الاستراتيجية. يعزز الحوكمة المالية ويدفع بالالتزام بالسياسات والمعايير المالية. يتعاون مع كبار القادة ورؤساء وحدات الأعمال لضمان دعم الاستراتيجيات المالية للأهداف التجارية الشاملة. يشرف على وضع وإدارة الميزانيات والأهداف المالية على المستوى الاستراتيجي. يقود المراجعات رفيعة المستوى للأداء المالي وينفذ التحسينات لمواءمة ا"}}, {"code": "INVA", "name": "تقييم الاستثمار", "desc": "تقييم مدى جاذبية الاستثمارات أو المشروعات المحتملة.", "levels": {"4": "يجري تقييمات للاستثمار ويوثقها في عدد من المشاريع المختلفة. يحدد آليات التقييم الملائمة بناء على خصائص المشروع. يجمع المعلومات اللازمة لإجراء تقييم للاستثمار بالتعاون مع أصحاب المصلحة في داخل المؤسسة وخارجها. يقدم نتائج تقييم الاستثمار لعدد منتقى من أصحاب المصلحة. يُجري وينقح عمليات تقييم الاستثمار.", "5": "يقدم المشورة بشأن أساليب تقييم الاستثمار ويصمم معايير مؤسسية تتفق مع المحافظ/ البرامج. يقود أنشطة تقييم الاستثمار للحافظات والبرامج البسيطة والمشاريع المعقدة.", "6": "يضع السياسات والمعايير والمبادئ التوجيهية المؤسسية الخاصة بعمليات تقييم الاستثمار. يقود الأنشطة المتعلقة بإجراء التقييم المستمر للمشروعات والبرامج الخاصة بالمؤسسة التي تحويها إحدى الحافظات. يستعرض عمليات تقييم الاستثمار الخاصة بالمبادرات عالية القيمة لضمان جودتها. يقود عمليات تقييم الاستثمار لبرامج وحافظات العمل المعقدة."}}, {"code": "BENM", "name": "إدارة تحقيق الفوائد", "desc": "التنبؤ والتخطيط ومراقبة ظهور الفوائد المتوقعة من المشاريع والبرامج وتحقيقها بشكل فعال.", "levels": {"3": "يدعم تحديد وتتبع الفوائد للمشاريع والبرامج. يجمع البيانات لقياس مدى تحقيق الفوائد.", "4": "يساهم في تطوير وتنفيذ خطط إدارة تحقيق الفوائد للمشاريع والبرامج. يتعاون مع أصحاب المصلحة لتحديد وقياس الفوائد ووضع مقاييس وآليات لتتبع تحقيق الفوائد. يراقب ويقدم تقارير عن التقدم المحرز نحو تحقيق الفوائد. يحدد المخاطر والإشكاليات لتي قد تؤثر على تحقيق الفوائد المرجوة ويصعدها حسب الاقتضاء. يدعم ترسيخ ممارسات إدارة تحقيق الفوائد في جميع أنحاء المؤسسة.", "5": "يدفع نحو القيام بالأنشطة اللازمة لتحقيق الفوائد المرجوة من كل جزء من أجزاء برنامج التغيير. يحدد مقاييس وآليات محددة لقياس الفوائد ويخطط لتفعيل هذه الآليات في الوقت المطلوب. يراقب الفوائد بمضاهاتها بما تم التنبؤ به في دراسة الجدوى. يعمل على إشراك الجميع طوال برنامج التغيير واستعدادهم الكامل لاستغلال بيئة العمل التشغيلية الجديدة. يدعم المديرين التشغيليين لضمان توافق جميع الخطط وحزم العمل والمنتجات ا", "6": "يعمل مع المدراء المسؤولين عن التشغيل لضمان إجراء أكبر قدر من التحسينات بينما تقوم مجموعات من المشاريع بتسليم منتجاتها للبدء في استخدامها. يعرّف العاملين في كافة مستويات العمل بالرؤية المتعلقة ببرنامج التغيير ويركز اهتمامه على أهداف العمل. يجري دراسة جدوى للأعمال لضمان تمويل البرنامج ويتثبت على فترات زمنية منتظمة من قدرة البرنامج على مواصلة أعماله."}}, {"code": "BUDF", "name": "وضع الميزانية والتوقعات", "desc": "تطوير وإدارة الميزانيات والتوقعات المالية لتمكين اتخاذ القرارات الفعالة وتخصيص الموارد.", "levels": {"2": "يساعد في جمع البيانات المالية وإعداد نماذج الميزانية الأساسية تحت الإشراف. يدعم عملية إعداد الميزانية والتوقعات من خلال إكمال المهام الموكلة إليه.", "3": "يقوم بأداء مهام محددة في عملية إعداد الميزانية والتنبؤ، بما في ذلك تحليل البيانات وإعداد التقارير، باستخدام الأساليب القياسية. يحدد مشكلات الميزانية والتنبؤ الروتينية ويقوم بحلها. يتواصل مع أصحاب المصلحة المعنيين بشأن المعلومات الخاصة بعملية وضع الميزانية والتوقعات.", "4": "يساهم في تطوير عملية وضع الميزانيات والتوقعات لمجالات مسؤولية محددة. يجمع البيانات المالية ويحللها ويعد نماذج وتقارير الميزانية. يدعم التواصل والتعاون بين أصحاب المصلحة في عملية إعداد الميزانية والتوقعات.", "5": "يدفع نحو تطوير عملية وضع الميزانيات والتوقعات لقسم أو وظيفة ما. كما يقدم النصح والإرشاد الموثوق بشأن ممارسات وضع الميزانية والتوقعات. يختار منهجيات وأدوات وضع الميزانية والتوقعات المناسبة ويطبقها. يدمج عملية التخطيط للسيناريوهات المحتملة وتحليل الحساسية وتقييم المخاطر مع عملية وضع الميزانية والتوقعات. يتعاون مع أصحاب المصلحة لمواءمة الميزانيات والتوقعات مع الأهداف المؤسسية ومقاييس الأعمال.", "6": "يطور وينفذ استراتيجيات وسياسات وعمليات إعداد الميزانية والتوقعات بما يتماشى مع الأهداف الشاملة للمؤسسة ومقاييس الأعمال. يدفع نحو تبني ممارسات العمل الجيدة في جميع أنحاء المؤسسة. يشرف على تطوير النماذج المالية المعقدة وعمليات تحليل السيناريوهات المحتملة لدعم عمية لاتخاذ القرارات الاستراتيجية. يقدم رؤى وتوصيات لتحسين الاستثمارات وتخصيص الموارد. يتعاون مع كبار القادة لضمان دعم الميزانيات والتوقعات لل"}}, {"code": "FIAN", "name": "التحليل المالي", "desc": "إجراء تحليل معمق للبيانات المالية لاستخلاص الأفكار ودعم عملية اتخاذ القرار.", "levels": {"2": "يساعد في جمع وتنظيم البيانات المالية وإعداد التقارير الأساسية تحت الإشراف. يدعم عملية التحليل المالي من خلال إكمال المهام الموكلة إليه وطلب التوجيه عند الحاجة.", "3": "يطبق تقنيات وعمليات التحليل المالي الراسخة للقيام بمهام محددة مثل تحليل البيانات التفصيلية وإنشاء التقارير وتفسير المقاييس المالية. كما يساهم في تطوير رؤى قابلة للتنفيذ لاتخاذ القرار. يعرّف أصحاب المصلحة المعنيين بنتائج عمليات التحليل المالي.", "4": "يقوم بإجراء التحليلات المالية لمناطق محددة، باستخدام التقنيات والأدوات القياسية. يقوم بإعداد التقارير وتقديم رؤى لدعم عملية اتخاذ القرار. يقوم بإجراء تحليلات التكلفة والفائدة ويدعم التعاون بين أصحاب المصلحة في عملية إدارة التكاليف. يتعاون مع أصحاب المصلحة لفهم المتطلبات وتقديم التحليلات ذات الصلة. يدعم تطوير النماذج المالية والعمل بها.", "5": "يقود أنشطة التحليل المالي لقسم أو وظيفة، ويطبق تقنيات وأدوات متقدمة. يط  وإدارة الحسابات، وتقديم خدمات الاستشارات في جوانب متنوعة."}}, {"code": "TECH", "name": "الاستشارات المتخصصة", "desc": "تقديم المشورة والتوجيهات الموثوقة والمهنية في أحد المجالات المتخصصة.", "levels": {"4": "يقدم نصائح مفصلة ومحددة لدعم وضع خطط المؤسسة وعملياتها، وعادة ما تكون مرتبطة بمجال المسؤولية المباشر. يحافظ بدأب على مستوى المعرفة المعترف بها في تخصص واحد أو أكثر يمكن تحديده. يدرك ويحدد حدود معرفته المتخصصة. حيثما كان ذلك مناسبًا، يتعاون مع غيره من المتخصصين لضمان أن تكون المشورة المقدمة سليمة مهنيًا وتتناسب مع احتياجات المؤسسة.", "5": "يقدم المشورة المهنية التي توجه القيادة التشغيلية وتؤثر على ترجمة الاستراتيجية إلى عمليات في مجال تخصصها. يشرف على تقديم المشورة المتخصصة من قبل الآخرين. يجمع الخبرات من مصادر متعددة، بما في ذلك خبراء من خارج المؤسسة، لتقديم المشورة المحكمة والسليمة مهنيًا لتحقيق المزيد من الأهداف المؤسسية. يدعم ويعزز تطوير وتبادل المعرفة المتخصصة داخل المؤسسة.", "6": "يقود ويشجع تطوير وتطبيق المعرفة المتخصصة في جميع أنحاء المؤسسة، ويقدم المشورة المهنية التي تشكل الاتجاه والقرارات رفيعة المستوى. يحافظ على شبكة من الخبراء المعترف بهم (داخل و/أو خارج المؤسسة) الذين يمكنهم تقديم المشورة المتخصصة في المجالات ذات الصلة. يؤثر بشكل فعال على تخطيط التطوير المهني عبر جزء كبير من المؤسسة لتعزيز تطوير الخبرة المناسبة وتوفير المشورة المهنية عالية الجودة."}}, {"code": "PEDP", "name": "الامتثال لتشريعات المعلومات والبيانات", "desc": "تنفيذ وتعزيز الامتثال لتشريعات إدارة المعلومات والبيانات.", "levels": {"4": "يدعم تنفيذ السياسات والمعايير والمبادئ التوجيهية المتعلقة بتشريعات المعلومات والبيانات ومتطلبات الامتثال. يراقب تنفيذ الضوابط الفعّالة للتفويض الداخلي والتدقيق والرقابة المتعلقة بإدارة المعلومات. يقدم تقارير عن الحالة الموحدة لضوابط المعلومات للاسترشاد بها في عملية اتخاذ القرارات بنجاح. يحدد المخاطر التي تكتنف استخدام المعلومات والبيانات الخاضعة لتشريعات محددة. يوصي بإجراءات تصحيحية حسب الحاجة.", "5": "يساهم في وضع السياسات والمعايير والإرشادات الخاصة بالامتثال للمعلومات والبيانات. يقدم المشورة الموثوقة بشأن تنفيذ ضوابط الامتثال فيما يتصل بالمنتجات والخد ت الخاصة بالأساليب والأدوات. يحدد الاتجاه ويقود الجهود نحو إدخال الآليات والمنهجيات والأدوات واستخدامها لتلبية متطلبات العمل. يقود جهود تطوير القدرات المؤسسية من حيث الأساليب والأدوات لضمان التبني المستمر للسياسات والمعايير والالتزام بها. يضمن التزام المؤسسة وتوافر مواردها المتعلقة بالأساليب والأدوات. يقود التحسين المستمر والابتكار فيما يتصل بالأساليب والأ"}}, {"code": "POMG", "name": "إدارة المحفظة", "desc": "وضع إطار للإدارة وتطبيقه لتحديد وتحقيق مجموعة من البرامج والمشاريع و/ أو الخدمات القائمة.", "levels": {"5": "يضمن التزام قادة البرامج/المشاريع و/أو مالكي الخدمة بالأطر المتفق عليها لإدارة المحفظة وحوكمتها. يشرح نوعية المعلومات المطلوبة ويكفل قيامهم بتقديم هذه المعلومات ملتزمين بالجداول الزمنية ومستوى الدقة المتفق عليها. يقوم بإعداد التقارير عندما يقتضي الأمر حول حوكمة المحفظة، ويُضمّنها التوصيات الخاصة بالتغييرات اللازم إدخالها على المحفظة.", "6": "يتعاون مع كبار المديرين ويؤثر عليهم لضمان تحقيق المحفظة لأهداف العمل المتفق عليها. يقود عملية تحديد وتخطيط وجدولة ومراقبة أنشطة المحفظة، وضمان توافقها مع معايير الحوكمة. يضمن مساهمة كل مكون من مكونات المحفظة في الأهداف العامة. يحدد ويعالج القضايا المتعلقة بالمحفظة، ويوصي بالإجراءات التصحيحية ويراقبها. يجمع ويلخص الإجراءات التي تمت على المحفظة، ويقدم تقارير عن وضعها ويضمن امتثالها لأطر الحوكمة.", "7": "يعتمد هيكل المحافظ ويتولى موائمتها مع استراتيجية وأهداف العمل والفرص الناشئة. يقود عملية صياغة إطار عمل لإدارة محفظة المؤسسة وتنفيذه ومراجعته. يضع معايير لترتيب الموارد والتغييرات المزمع تنفيذها من حيث الأولوية. يوصى باتخاذ إجراءات تصحيحية وينفذها من خلال إشراك الإدارة العليا والتأثير عليها. يقود أعمال المراقبة والمراجعة المستمرة للمحفظة من حيث تأثيرها على أنشطة العمل الحالية والمزايا الاستراتيجية"}}, {"code": "PGMG", "name": "إدارة البرنامج", "desc": "تحديد عدد من المشاريع والأنشطة المتصلة ببعضها البعض ووضع خطط لها والتنسيق فيما بينها لدعم استراتيجيات وأهداف عمل محددة.", "levels": {"6": "يخطط ويوجه وينسق الأنشطة لإدارة وتنفيذ برنامج بدءا من إطلاقه، وحتى الانتقال النهائي إلى الإدارة التشغيلية المعتادة. يخطط ويضع جداول زمنية ويراقب ويقدم تقارير عن الأنشطة المتعلقة بالبرنامج. ينشئ ويحافظ على أطر حوكمة وإدارة مخاطر مناسبة وفعالة. يضمن وجود سياسات شاملة للإبلاغ والاتصال واتباعها. يقوم بالتوعية بالتطورات الفنية الحالية التي قد توفر فرصًا للبرامج. يضمن إدارة البرامج بما يحقق مزايا الأعما", "7": "يحدد الاستراتيجية المؤسسية التي تحكم إدارة البرامج، بما في ذلك تطبيق المنهجيات المناسبة. يخطط ويوجه وينسق الأنشطة لإدارة وتنفيذ البرامج المعقدة من البداية إلى التكامل الكامل مع الإدارة التشغيلية المعتادة. يوائم أهداف البرنامج مع أهداف العمل ويأذن بالمشاريع والأنشطة ذات الصلة. يخطط ويضع الجداول الزمنية ويراقب ويقدم التقارير عن أنشطة البرنامج، مدعومًا باستراتيجيات الإبلاغ والاتصال الشاملة. يضمن وجود"}}, {"code": "PRMG", "name": "إدارة المشاريع", "desc": "تحقيق نتائج المشروع المتفق عليها من خلال مواءمة تقنيات الإدارة المناسبة والتعاون والقيادة والحوكمة مع سياقات المشروع والمؤسسة المحددة.", "levels": {"4": "يحدد ويوثق وينفذ المشاريع الصغيرة أو المشاريع الفرعية. يعمل بشكل مستقل أو مع فريق صغير، ويشارك بنشاط في جميع مراحل المشروع. يطبق أساليب وأدوات إدارة المشاريع المناسبة. يحدد ويقيم ويدير المخاطر بشكل فعال. يعد خطط مشروع واقعية (بما في ذلك الخطط الخاصة بالنطاق والجدول الزمني والجودة والمخاطر والاتصال)، مع العمل على إشراك أصحاب المصلحة والتوافق مع معايير الحوكمة المؤسسية. يتتبع الأنشطة في ضوء الجدول ا", "5": "يتحمل المسؤولية الكاملة عن تعريف المشاريع متوسطة الحجم ونهجها وتسهيلها وإكمالها بشكل مرضي. يوفر قيادة فعالة لفريق المشروع، ويتبنى أساليب وأدوات إدارة مشاريع مناسبة. يدير عمليات الرقابة على التغيير ويقيم المخاطر، بما يضمن توافق المشاريع مع أطر الحوكمة وأولويات العمل. يتواصل بانتظام مع أصحاب المصلحة، ويضمن التزام مخرجات المشروع بالمعايير والميزانيات والجداول الزمنية المتفق عليها. يعمل على إجراء مراج", "6": "يتحمل المسؤولية الكاملة عن تعريف وتوثيق وإتمام المشاريع المعقدة بنجاح. يتبنى ويكيف أساليب وأدوات إدارة المشاريع المناسبة لاحتياجات المشروع. يكفل نجاح عمليات الرقابة والضبط للموارد والميزانيات والجداول الزمنية. يدمج إدارة المخاطر القوية ضمن أطر الحوكمة لمواءمة القرارات مع مدى استعداد المؤسسة لل  جديدة أو تكييف المنت"}}, {"code": "DLMG", "name": "إدارة تطوير النظم", "desc": "تخطيط وتقييم وتنفيذ أعمال تطوير النظم بما يتفق مع المستهدفات المحددة من حيث الإطار الزمني والميزانية والجودة.", "levels": {"4": "يساهم في تخطيط وإدارة أعمال تطوير الأنظمة. يتبنى ويطبق أساليب وأدوات وتقنيات تطوير الأنظمة المناسبة بما يتماشى مع المعايير المتفق عليها. يتعاون مع أصحاب المصلحة لضمان تلبية مخرجات تطوير الأنظمة للمتطلبات وتوقعات الجودة. يدير المخاطر والقضايا المتعلقة بأنشطة تطوير الأنظمة، ويصعدها حسب الحاجة. يساهم في التحسين المستمر لعمليات وممارسات تطوير الأنظمة.", "5": "يخطط أعمال تطوير النظم لتحقيق أهداف المؤسسة وخططها. يختار ويعتمد ويطوع الأساليب والأدوات والآليات المناسبة لتطوير النظم. يضمن إطلاع أصحاب المصلحة على الموارد المطلوبة ويعمل على توفير هذه الموارد. يعمل على تيسير إتاحة الموارد والاستخدام الأمثل لها. يقوم برصد وإعداد التقارير عن التقدم المحرز في مشاريع التطوير. يضمن تنفيذ المشاريع وفقا للبنى الهندسية والمعايير والأساليب والأدوات المتفق عليها ويعمل عل", "6": "يضع السياسات ويدفع نحو الالتزام بالمعايير الخاصة بتطوير النظم. يقود الأنشطة التي تسعى لغرس الأمن والخصوصية في عملية تطوير النظم. يحدد ويدير الموارد اللازمة لجميع مراحل مشاريع تطوير النظم. يعمل على تحقيق المستهدفات التقنية والمالية والمستهدفات المتعلقة بالجودة.", "7": "يقود عملية صياغة وتطبيق الإطار الخاص بإدارة تطوير النظم بالمؤسسة وإخضاعه للتطوير المستمر. يوائم ما بين عملية تطوير النظم مع استراتيجيات وأهداف العمل من ناحية ومع التكنولوجيا والفرص الرقمية الناشئة. لديه تصور عام حول مساهمة برامج تطوير النظم في النجاح المؤسسي. يجيز هيكل مهام ومنصات تطوير النظم. يضع استراتيجية لإدارة الموارد في إطار عملية تطوير النظم ويجيز تخصيص الموارد لبرامج تطوير النظم."}}, {"code": "DESN", "name": "تصميم النظم", "desc": "تصميم نظم تفي بمتطلبات محددة وأساليب هندسة النظم المتفق عليها.", "levels": {"2": "يساعد في إنشاء وتوثيق عناصر تصميم النظام تحت الإشراف الروتيني. يتبع الإجراءات والمبادئ التوجيهية المعمول بها. يساعد في إنشاء وصيانة الوثائق.", "3": "يتبع النهج القياسية وأنماط التصميم المعمول بها لخلق تصميمات جديدة للنظم البسيطة ر واستراتيجيات بهدف إنشاء المحتوى المطلوب. يحدد معايير وأساليب للتصميم لتحقيق غابات المؤسسة فيما يتصل بإنشاء المحتوى. يخطط ويقود جهود إنشاء المحتوى للبرامج الاستراتيجية الكبيرة المعقدة."}}, {"code": "ICPM", "name": "نشر المحتوى", "desc": "إدارة العمليات لجمع وتجميع ونشر المحتوى عبر قنوات مختلفة لتلبية احتياجات المؤسسة والجمهور.", "levels": {"1": "يساهم، بموجب التعليمات، في أنشطة دعم النشر. يدعم تجميع البيانات. يستخدم عمليات وإجراءات النشر المعمول بها وفقًا للإرشادات المناسبة.", "2": "يستخدم مفاهيم النشر الفني والأدوات والأساليب لنشر المحتوى وفقًا للإجراءات والإرشادات المتفق عليها. يقوم بإعداد المحتوى وتنسيقه لتلبية احتياجات الجمهور المستهدف والمنصة. يحصل على بيانات الاستخدام ويحللها ويقدمها بشكل فعال. يطبق مبادئ قابلية الاستخدام وإمكانية الوصول إلى المعلومات المنشورة.", "3": "تنسيق عمليات وإجراءات إدارة المحتوى لتلبية احتياجات المستخدمين. استخدام أنظمة نشر المحتوى لإدارة المحتوى المنشور عبر قنوات مختلفة. المساعدة في تحديد منشئي المحتوى والعمل معهم. النظر في جميع القضايا القانونية المتعلقة بالنشر.", "4": "يطبق المبادئ التوجيهية الخاصة بالمؤسسة ويستخدم الأدوات والآليات المناسبة لتوفير واجهات نشر للمنصات والتطبيقات الجديدة أو القائمة بالفعل. يطبق عمليات وممارسات إدارة المحتوى ويقوم بتحديثها للوفاء باحتياجات المستخدمين. يختار القنوات المناسبة التي يجب نشر المحتوى من خلالها. يساهم مع معدي المحتوى ويقدم لهم المشورة. يقدم النصح للمستخدمين ومعدي المحتوى للاستفادة من خصائص القنوات والأدوات المستخدمة المعني", "5": "يخطط ويدير أنشطة ومهام نشر المحتوى. يطور المعايير والعمليات والممارسات لنشر المحتوى بشكل متسق عبر منصة/قناة واحدة أو أكثر. يقدم المشورة بشأن النهج والتقنيات التي يجب استخدامها لنشر المحتوى. يقدم المشورة بشأن مناهج نشر المحتوى والتعاون مع المبدعين. يضمن تصميم بنية المحتوى وأسلوبه بشكل عام. يضمن امتثال عمليات النشر للسياسات والاستراتيجيات المتفق عليها والمتطلبات القانونية.", "6": "الحصول على الالتزام والموارد المؤسسية لضمان الجودة المناسبة للمواد المنشورة من قبل المؤسسة أو نيابة عنها. تحديد السياسات والمعايير والعمليات والممارسات المؤسسية لنشر المحتوى، بما في ذلك شرا الأمنية ويمكّن من حلها. يقدم التق", "5": "يوفر القيادة الفنية لتحسين أداء البنية التحتية للتكنولوجيا. يقود تبني الأدوات والعمليات الآلية للإدارة التشغيلية الفعالة والتسليم. يشرف على التخطيط والتركيب والصيانة وقبول مكونات البنية التحتية الجديدة والمحدثة والخدمات القائمة على البنية التحتية. يتماشى مع توقعات الخدمة ومتطلبات الأمان ومعايير الجودة الأخرى. يضمن أن الإجراءات التشغيلية والوثائق حديثة وفعالة، ويتتبع القضايا التشغيلية ويعالجها ويقد"}}, {"code": "SYSP", "name": "إدارة برامج النظام", "desc": "تثبيت وإدارة وصيانة أنظمة التشغيل وإدارة البيانات وأتمتة المكاتب وبرامج المرافق عبر بيئات البنية التحتية المختلفة.", "levels": {"2": "يساعد في أداء مهام إدارة برمجيات النظام تحت الإشراف الروتيني. يدعم تثبيت وتكوين برمجيات النظام. يساعد في مراقبة أداء النظام واستخدام الموارد. يساعد في توثيق إعدادات وتحديثات برمجيات النظام.", "3": "يراقب الأنظمة التشغيلية لمعرفة معدلات استخدام الموارد ومعدلات الفشل، لتوجيه وتيسير ضبط برمجيات النظام. يطبق إعدادات برمجيات النظام لتحسين الأداء، ما يتيح تحقيق أقصى قدر من الإنتاجية والاستخدام الفعّال للموارد. يقوم بتثبيت واختبار الإصدارات الجديدة من برمجيات النظام. يساعد في إنشاء إجراءات تنفيذ البرمجيات، بما في ذلك خطط الطوارئ مواجهة الأعطال.", "4": "يراقب مقاييس برمجيات النظام ويضبط التكوينات لتحقيق أقصى قدر من التوافر والأداء. يطبق الخبرة الفنية لدراسة مشكلات برمجيات النظام المعقدة وحلها، ويطلب اتخاذ إجراء من المورد إذا لزم الأمر. يحلل تحديثات برمجيات النظام ويحدد التحديثات التي تتطلب إجراءات. يطور إجراءات شاملة لتنفيذ البرمجيات مع خطط طوارئ قوية.", "5": "يتأكد من توفير برمجيات النظام وتكوينها لدعم تحقيق أهداف الخدمة. يطور ويحافظ على أدوات وإجراءات التشخيص لاستكشاف الأخطاء وإصلاحها وتحليل الأداء. يقيم برمجيات النظام الجديدة ويوصي بتبني اعمل بها عند الاقتضاء. يخطط لتوفير واختبار الإصدارات الجديدة من برمجيات النظام. يضمن أن الإجراءات التشغيلية والتشخيصية لبرامج النظام حديثة ويمكن الوصول إليها ومفهومة جيدًا. يدرس وينسق حل مشاكل الخدمة المحتملة والفعلي"}}, {"code": "NTAS", "name": "دعم الشبكات", "desc": "تقديم خدمات الصيانة والدعم لشبكات الاتصالات.", "levels": {"1": "يدعم مهام الشبكة الروتينية تحت إشراف دقيق. يراقب سلامة الشبكة الأساسية ويقدم تقارير عن حالة مكونات الشبكة. يساعد في استكشاف الأخطاء وإصلاحها بشكل مباشر ويتبع الإجراءات المعمول بها للحفاظ على استمرارية التشغيل. يرفع المشكلات حسب الضرورة إلى مستويات أعلى من الدعم", "2": "يساعد في التكوين التشغيلي لمكونات الشبكة والتحقيق في مشاكل الشبكة وحلها. يساعد في تنفيذ أدوات البرمجة الأساسية والأتمتة لتبسيط مهام دعم الشبكة. يساعد في إجراءات الصيانة المحددة ويتبع معايير السلامة والأمان والجودة المعمول بها. يوفر الدعم والتوجيه الأولي لمستخدمي الشبكة، ويصعد المشكلات حسب الضرورة.", "3": "تنفيذ مهام صيانة الشبكة المتفق عليها والتكوين التشغيلي المحدد لمكونات الشبكة. تحديد وتشخيص مشاكل/أخطاء الشبكة باستخدام الأدوات اللازمة لاستكشاف الأخطاء وإصلاحها وبرمجيات إدارة الشبكة، بما في ذلك معالجة المشكلات المتعلقة بالأمان. تنفيذ وصيانة البرمجيات النصية وأدوات الأتمتة ومنصات التنسيق لتحسين عمليات دعم الشبكة. جمع إحصائيات الأداء وحركة المرور والتعاون مع الآخرين لضمان فعالية الشبكة وحل المشكلات", "4": "يطبق الخبرة الفنية للحفاظ على البنية الأساسية للشبكة وتحسينها، وتنفيذ التحديثات واستخدام أدوات الأتمتة. يستخدم أدوات إدارة الشبكة لمراقبة الحمل والأداء وإحصائيات الأمان. يحقق في المشكلات التشغيلية والأمنية المتعلقة بالشبكة ويمكّن من حلها. يقوم بتكوين الأدوات و/أو إنشاء البرامج النصية لأتمتة مهام الشبكة. يحافظ على الإجراءات التشغيلية ويتحقق من اتباعها. يقدم التقارير والمقترحات لتحسينها لأصحاب المصل", "5": "يقود عمليات الشبكة لتحسين الأداء. يشرف على التخطيط والتثبيت والصيانة وقبول مكونات الشبكة والخدمات، بما يتماشى مع توقعات الخدمة والمعايير ومتطلبات الأمان. يضمن التعامل مع طلبات دعم الشبكة وفقًا للمعايير والإجراءات المحددة. يقود تبني الأدوات والعمليات لضمان الإدارة التشغيلية الفعالة والتسليم، وضمان معالجة الاعتبارات الأمنية. ينفذ الإجراءات وعمليات التوثيق. يحقق في مشاكل الشبكة المعقدة ويحلها. يتتبع "}}, {"code": "HSIN", "name": "تثبيت وحذف النظم", "desc": "تثبيت واختبار أو وقف تشغيل وحذف النظم أو مكونات النظم.", "levels": {"1": "يتبع الإجراءات المتفق عليها في تنفيذ أعمال التثبيت البسيطة، واستبدال العناصر الاستهلاكية، والتحقق من عمل ما تم تثبيته بشكل صحيح. يقوم بتوثيق العمل المنجز وإعداد تقارير به.", "2": "يثبت أو يحذف مكونات النظم باستخدام تعليمات وأدوات للتثبيت يتم تزويده بها. يجري اختبارات معيارية ويساهم في دراسة المشكلات والأعطال. يؤكد على الطريقة الصحيحة لعمليات التثبيت. يوثق النتائج بما يتفق مع الإجراءات المتفق عليها.", "3": "يقوم بتثبيت أو حذف جهاز و/ أو برمجيات باستخدام تعليمات وأدوات التثبيت التي تلقاها بما في ذلك التسليم للعميل. يستخدم الإجراءات والأدوات التشخيصية المعيارية لاختبار عمليات التثبيت وتصحيح الإشكاليات وتوثيق النتائج. يسجل تفاصيل جميع المكونات التي تم تثبيتها وحذفها. يساعد المستخدمين ويتبع الإجراءات المتفق عليها لطلب المساعدة الإضافية أو تصعيد المشكلة. يساهم في تطوير إجراءات ومعايير التثبيت.", "4": "يجري أو يشرف على عمليات التثبيت والحذف المعقدة للنظم أو المكونات بما في ذلك تسليمها للعميل. يضع الإجراءات والمعايير الخاصة بالتثبيت والتسليم لتقديم خدمة التثبيت وتحسينها. يضع جدولاً زمنيًا لأعمال التثبيت يراعي كلاً من أولويات العميل وتوافر الموارد. يضمن الالتزام بإجراءات السلامة والجودة.", "5": "يتولى مسؤولية مشاريع تثبيت النظم و/ أو وقفها بصورة نهائية. ويوفر قيادة فعالة للفريق، بما في ذلك تدفق المعلومات من العملاء وإليهم خلال العمل في المشروع. يطور خطط الجودة ولوائح طرق التنفيذ ويقوم بتطبيقها. يراقب مدى فاعلية عمليات التثبيت ويضمن تنفيذ التوصيات الصحيحة الخاصة بالتغيير."}}, {"code": "CFMG", "name": "إدارة التهيئة", "desc": "تخطيط وتحديد وضبط وتبرير وتدقيق جودة عناصر التكوين والتهيئة (CIs) والعلاقات التي تربط بينهم.", "levels": {"2": "يطبق الأدوات والتقنيات والعمليات لإدارة وتتبع وتسجيل عناصر التكوين والمكونات والتغييرات الصحيحة وإعداد تقارير بها وتصحيحها. يساعد في أعمال التدقيق للتحقق من دقة المعلومات ويتولى تنفيذ أي إجراءات تصحيحية ضرورية بموجب توجيهات تصدر بذلك.", "3": "يطبق الأدوات والتقنيات والعمليات لتتبع وتسجيل وتصحيح المعلومات المتعلقة بعناصر التكوين. يتحقق من التغييرات ويوافق عليها لحماية الأصول والمكونات من التغيير غير المصرح به والتحويل والاستخدام غير المناسب. يدعم امتثال المستخدم لمعايير التعريف لأنواع الكائنات والبيئات والعمليات ودورات الحياة والوثائق والإصدارات والتنسيقات وخطوط الأساس والإصدارات والقوالب. يقوم بإجراء عمليات تدقيق للتحقق من دقة المعلوما", "4": "يقترح ويعتمد عناصر التكوين والتهيئة لتكون محددة الهوية بشكل فريد وفقاً للأعراف الخاصة بمصطلحات التسمية. يضمن وجود عمليات تشغيلية تلتزم بالأمان في عمليات التكوين والتهيئة والتصنيف والإدارة لعناصر التكوين والتهيئة، والتحقق من سجلات التكوين والتهيئة وتدقيقها. يعمل على تطوير وتهيئة وصيانة الأدوات (بما فيها الأتمتة) لتحديد وتتبع وتسجيل وامتلاك معلومات دقيقة وكاملة وحديثة. يعد تقارير حالة عن عمليات إدار", "5": "يخطط لتحديد وإدارة عناصر التكوين والتهيئة والمعلومات ذات الصلة. يعتمد نطاق عمليات إدارة التكوين والتهيئة وعناصرها والمعلومات ذات الصلة التي يتعين مراقبتها. يتولى تحديد وتقييم وإدارة اعتماد الأدوات والتقنيات والعمليات المناسبة (بما في ذلك الأتمتة) لإدارة التكوين والتهيئة. يساهم في تطوير الاستراتيجيات والسياسات والمعايير والمبادئ التوجيهية الخاصة بإدارة عمليات التكوين والتهيئة.", "6": "يعمل على تطوير الاستراتيجيات والسياسات والمعايير والمبادئ التوجيهية الخاصة بإدارة عمليات التكوين والتهيئة. يبرز أهمية وقيمة إدارة التكوين والتهيئة ويطور أساليب جديدة وقدرات مؤسسية (بما في ذلك الأتمتة) لإدارة التكوين والتهيئة. يوفر الموارد لتعزيز تبني السياسات والمعايير والالتزام بها. يقيس ويرصد الالتزام بالمعايير ويضمن التنفيذ المتسق للعملية عبر المؤسسة كلها."}}, {"code": "RELM", "name": "إدارة الإصدار", "desc": "إدارة إصدار الخدمات الجديدة والمحدثة في الإنتاج، وضمان التوافق مع أهداف العمل ومعايير الامتثال.", "levels": {"2": "يساعد في مهام إدارة الإصدارات تحت الإشراف الروتيني. يدعم جمع البيانات والمعلومات لتخطيط الإصدارات وجدولتها. يساعد في إعداد مواد وموارد الإصدارات. يساعد في توثيق وصيانة سجلات أنشطة الإصدارات. يشارك في مهام الاختبار الأساسية وضمان الجودة وحل المشكلات.", "3": "يدعم التخطيط والجدولة للإصدارات. ينسق أنشطة الإصدار مع الفرق ذات الصلة. يتبع عمليات وإجراءات الإصدار المحددة. يشارك في أنشطة الاختبار وضمان الجودة لضمان استيفاء الإصدارات للمعايير. يحدد المشكلات المتعلقة بعملية الإصدار ويحلها. يوثق ويقدم تقارير عن نتائج الإصدار ويوصل النتائج إلى أصحاب المصلحة.", "4": "يخطط ويضع جداول للإصدارات بما يتماشى مع متطلبات وأهداف العمل. ينسق أنشطة الإصدار عبر العديد من الفرق وأصحاب المصلحة. يدير دورة حياة الإصدار، ويضمن تسليم المنتجات في الوقت المناسب وبجودة عالية. يضمن تلبية الإصدارات لمعايير الجودة والأمان والامتثال المحددة. يعرّف أصحاب المصلحة بخطط الإصدار والتقدم المحرز والنتائج التي تم تحقيقها. يجري مراجعات ما بعد الإصدار ويحدد مجالات التحسين.", "5": "يطور ويحافظ على مناهج وإجراءات الإصدار وأدوات الأتمتة الخاصة بها. يشرف على التخطيط والجدولة للإصدارات المعقدة وواسعة النطاق. ينسق أنشطة الإصدار عبر مشاريع وبرامج متعددة. يضمن تطبيق عمليات الإصدار والإجراءات وإمكانية التراجع عن الإصدارات حسب الحاجة. يقوم بالتعريف بنُهُج الإصدار والنتائج. يجري تحليلات ما بعد الإصدار ويقود جهود التحسين المستمر.", "6": "يحدد استراتيجيات وسياسات ومعايير إدارة الإصدارات المؤسسية. يوائم إدارة الإصدارات مع استراتيجيات وأهداف العمل الشاملة. يضمن توافر الموارد والأدوات لإدارة الإصدارات الفعّالة. يتواصل مع أصحاب المصلحة بشأن استراتيجيات الإصدارات ونتائجها. يقود جهود تبني أساليب وتقنيات إدارة الإصدارات الجديدة."}}, {"code": "STMG", "name": "إدارة التخزين", "desc": "توفير وتكوين وتحسين حلول التخزين المحلية والمستندة إلى السحابة، وضمان توفر البيانات والأمان والتوافق مع أهداف العمل.", "levels": {"2": "يساعد في مهام إدارة التخزين مثل التزويد. يدعم إعداد وتكوين أنظمة التخزين، مع دمج ممارسات الأمان القياسية. يساعد في مراقبة أداء التخزين وسعته، وتوثيق استخدام التخزين.", "3": "تنفيذ مهام إدارة التخزين الروتينية وفقًا للإجراءات المعمول بها واستخدام الأدوات القياسية. تنفيذ عمليات تهيئة وتكوين موثقة لتخصيص تخزين وتثبيت وصيانة أنظمة التخزين الآمنة باستخدام الإجراءات التشغيلية المتفق عليها. تحديد المشكلات التشغيلية، بما في ذلك المشكلات المتعلقة بالأمن، والمساهمة في حلها. استخدام أدوات الإدارة والإبلاغ القياسية لجمع وإعداد تقارير عن استخدام التخزين والأداء وإحصائيات النسخ الا", "4": "يقوم بإعداد الإجراءات التشغيلية وتحديثها باستمرار لإدارة التخزين. يراقب القدرة والأداء والتوافر وغيرها من المقاييس التشغيلية الأخرى. يتخذ الإجراءات المناسبة لضمان الصيانة التصحيحية والاستباقية لنظم التخزين والنسخ الاحتياطي من أجل حماية معلومات الأعمال وتأمينها. يقوم بإعداد التقارير والمقترحات الخاصة بالتحسين. يساهم في تخطيط وتنفيذ عمليات التثبيت الجديدة وأعمال الصيانة المجدولة والتغييرات في النظم ", "5": "يعمل على تطوير المعايير والمبادئ التوجيهية الخاصة بتنفيذ وظيفة حماية البيانات واسترداد البيانات في أعقاب الكوارث في جميع تطبيقات وبيانات الأعمال. يقدم نصحًا وإرشادًا قائمين على الخبرة لتطبيق وتحسين عملية إدارة التخزين. يقوم بإدارة نظم التخزين والنسخ الاحتياطي لتوفير مستويات الخدمة المتفق عليها. يقوم بإنشاء وتحسين ودعم خدمات إدارة التخزين عبر الاستخدام الأمثل لموارد التخزين، وضمان أمن البيانات وتوا", "6": "تطوير السياسات المؤسسية والمعايير والإرشادات الخاصة بإدارة التخزين. تطوير استراتيجيات لإدارة التخزين والبيانات بناءً على مستوى أهمية المعلومات. ضمان الامتثال للمتطلبات التنظيمية والأمنية. مواءمة الاستثمارات في إدارة التخزين مع أهداف العمل وسياسات إدارة البيانات."}}, {"code": "DCMA", "name": "إدارة المرافق", "desc": "تخطيط وتصميم وإدارة المباني والفضاء والمرافق التي تشكل مجتمعة الأصول الخاصة بتكنولوجيا المعلومات", "levels": {"2": "يساعد في المهام المتعلقة بمنح ومراقبة وإعداد التقارير بشأن ضوابط الوصول المادية تحت الإشراف الروتيني. يتبع الإجراءات والمبادئ التوجيهية المعمول بها لدعم صيانة البيئة المادية. يساعد في إنشاء الوثائق وصيانتها.", "3": "يراقب الامتثال للعمليات المتفق عليها ويحقق في حالات عدم الامتثال ويقيمها ويحلها، ويصعدها عند الضرورة. يعالج طلبات الوصول المادي ويراقب أنظمة التحكم في الوصول ويقدم تقارير عن الأنشطة المتعلقة بالوصول.", "4": "يستخدم أدوات إدارة مركز البيانات لاستخلاص المعلومات الإدارية الخاصة بالطاقة والتبريد والمساحة، والتحقيق في المشاكل عندما يقتضي الأمر. يقوم بتنفيذ أعمال التدقيق والفحص الاعتيادية للتأكد من الالتزام بالسياسات والإجراءات. يعمل على تيسير تنفيذ اختبارات السلامة الكهربائية الإلزامية.", "5": "يعمل على تطوير معايير وعمليات ووثائق مراكز البيانات وتحديثها باستمرار. يسعى إلى تحسين كفاءة تعبئة فضاء مركز البيانات. يضمن الالتزام بجميع السياسات والعمليات ذات الصلة. يستخدم أدوات إدارة مركز البيانات لتخطيط وتسجيل وإدارة البنية التحتية ومصادر الطاقة والفضاء وقدرات التبريد المثبتة. يراقب الاستخدام والإجراءات التي يتم اتخاذها للوفاء بمستهدفات المؤسسة الخاصة بالاستدامة.", "6": "يضع السياسات المؤسسية لإدارة البنية التحتية لتكنولوجيا المعلومات، ويضمن توافقها مع الممارسات المعترف بها في المجال. يطور استراتيجيات للتنبؤ بمتطلبات مساحة مركز البيانات المستقبلية وتلبيتها. يتحمل المسؤولية الكاملة عن الالتزام بلوائح الصحة والسلامة وسياسات السلامة الكهربائية. يحدد وينفذ الممارسات المعترف بها في المجال لمواءمة الخطط المستقبلية مع أهداف الاستدامة المؤسسية."}}, {"code": "SLMO", "name": "إدارة مستوى الخدمة", "desc": "اعتماد المستهدفات الخاصة بمستويات الخدمة وعمليات تقييم ومراقبة وإدارة عملية تقديم الخدمات في ضوء المستهدفات المرجوة.", "levels": {"2": "يراقب ويسجل الخدمة الفعلية المقدمة. يقارن الخدمة المقدمة باتفاقيات مستوى الخدمة، ويحدد أي انحرافات أو مجالات للتحسين.", "3": "يراقب مقاييس الأداء الخاصة بتقديم الخدمة. يتواصل مع أصحاب المصلحة ليساعدهم على التخطيط لمواجهة تدهور الخدمة و/ أو حالات انتهاك الاتفاقات الخاصة بمستوى الخدمة.", "4": "يقوم بتنفيذ المهام المحددة لمراقبة تقديم الخدمة وفقاً لاتفاقيات مستوى الخدمة، ويحتفظ بسجلات للمعلومات ذات الصلة. يحلل أداء تقديم الخدمة لتحديد الإجراءات اللازمة للحفاظ على مستويات الخدمة أو تحسينها. يتخذ إجراءات تهدف لتحقيق أو تحسين مستويات معينة من الخدمة ويرفع تقارير بها.", "5": "يضمن تلبية الخدمات المقدمة لمستويات الخدمة المتفق عليها. يتفاوض مع العملاء حول الاشتراطات الخاصة بمستوى الخدمة ومستويات الخدمة المتفق عليها. يقوم بتشخيص مشاكل تقديم الخدمات ويتخذ إجراءات للحفاظ على مستويات الخدمة أو تحسينها. يقوم بتوفير وصيانة وسائل التشغيل والإجراءات والمرافق ومراجعتها بانتظام لضمان الفعالية والكفاءة.", "6": "يضمن المراقبة الفعالة لتقديم الخدمة وتطبيق الإجراءات المحددة للحفاظ على مستويات الخدمة أو تحسينها. يضمن استيفاء اتفاقيات مستوى الخدمة وجدواها من حيث التكلفة في الدليل الموضوع للخدمات المتاحة. يضمن توفر وسائل وإجراءات ومرافق وأدوات التشغيل ومراجعتها وصيانتها. يقوم بإعداد مقترحات لمواجهة التغيرات المتوقعة في مستوى أو نوع الخدمات. يقوم بمراجعة عملية تقديم الخدمة لضمان استيفاء المستهدفات المتفق عليها.", "7": "يضع استراتيجيات لتقديم الخدمات تدعم الاحتياجات الاستراتيجية للمؤسسة (العميل). يجيز تخصيص الموارد لمتابعة ترتيبات تنفيذ الخدمات. يعمل على تطوير العلاقات مع العملاء على أعلى مستوى لتحديد المجالات المحتملة لتحقيق المصالح التجارية المشتركة سعيًا إلى التطوير المستقبلي. يحافظ على تصور عام لمساهمة الترتيبات الخاصة بتنفيذ الخدمة في تحقيق نجاح المؤسسة. يوفر القيادة في مجال عمل المؤسسة فيما يخص تحديد الاتجا"}}, {"code": "SCMG", "name": "إدارة دليل الخدمات", "desc": "يوفر مصدرًا للمعلومات المستمرة حول الخدمات والمنتجات المتاحة للعملاء والمستخدمين.", "levels": {"2": "يساعد في مهام إدارة دليل الخدمة تحت الإشراف الروتيني. يدعم جمع وتحديث معلومات الخدمة والمنتج. يساعد في الحفاظ على دقة دليل الخدمة وصحة المعلومات الواردة فيه.", "3": "يجمع المعلومات اللازمة لتعبئة دليل الخدمات. يحرر ويقدم مواصفات الخدمة والمنتج ويحدّث قائمة الخدمات المتاحة باستمرار. يعمل كجهة اتصال تستقبل وتعالج المستجدات المعتادة على دليل الخدمات. يحدد الفرص السانحة لتطوير عمليات إدارة دليل الخدمات.", "4": "يجمع المعلومات اللازمة لتعبئة دليل الخدمات. يحرر ويقدم مواصفات الخدمة والمنتج ويحدّث قائمة الخدمات المتاحة باستمرار. يعمل كجهة اتصال تستقبل وتعالج المستجدات المعتادة على دليل الخدمات. يحدد الفرص السانحة لتطوير عمليات إدارة دليل الخدمات.", "5": "يدير عملية إنشاء وتحديث دليل الخدمات. يعمل عل أن يكون دليل الخدمات كاملاً وحديثًا. يعمل مع مالكي الخدمات لضمان الاتساق والدقة في العناوين المدرجة بدليل الخدمات. يقوم بالمراجعات الدورية للدليل مع أصحاب المصلحة لضمان ملائمته لاحتياجات العمل والاشتراطات الخاصة به. يدير عمليات إدارة دليل الخدمات."}}, {"code": "AVMT", "name": "إدارة التوافر", "desc": "ضمان تقديم الخدمات لمستويات الإتاحة المتفق عليها لتلبية احتياجات الأعمال الحالية والمستقبلية.", "levels": {"3": "ينفذ مهام إدارة الإتاحة المحددة، مثل المراقبة الروتينية وجمع البيانات. يختبر إجراءات التعافي من الكوارث تحت التوجيه ويساهم في توثيق خطط التعافي. يساعد في تشغيل أدوات وعمليات إدارة الإتاحة. يراقب مكونات الخدمة وفقًا لمعايير الأداء المتفق عليها ويبلغ عن أي انحرافات.", "4": "تحليل مدى إتاحة الخدمة والمكونات والموثوقية وسهولة الصيانة والخدمة. المساهمة في عملية إدارة الإتاحة وتشغيلها. مراقبة وصيانة الخدمات والمكونات لضمان الامتثال المستمر لأهداف الأداء ومستويات الخدمة المتفق عليها. تنفيذ ترتيبات الاسترداد من الكوارث وتوثيق إجراءات الاسترداد. إجراء اختبار لإجراءات الاسترداد.", "5": "يقدم النصح والإرشاد فيما يتعلق بتخطيط الخدمات وتصميمها وتحسينها وتوافر مكوناتها. يحقق في جميع حالات الإخفاق في الوصول للمستهدفات الخاصة بالإتاحة وعدم إتاحة الخدمة، مع إطلاق إجراءات لمعالجة هذا الإخفاق. يضع خططًا لمواجهة الكوارث جنبًا إلى جنب مع عمليات الدعم. يقوم بإدارة الاختبارات الخاصة بخطط مواجهة الكوارث.", "6": "يحدد السياسات ويضع الاستراتيجيات والخطط والعمليات اللازمة لضمان تقديم الخدمات لمستويات الإتاحة المتفق عليها. يطور ويطبق أدوات وآليات جديدة للإتاحة."}}, {"code": "COPL", "name": "إدارة الاستمرارية", "desc": "وضع وتنفيذ واختبار إطار لاستمرارية العمل.", "levels": {"2": "يحتفظ بسجلات لكل عمليات الاختبار والتدريب ويضمن توافر جميع الوثائق. يوثق التدابير التي تتخذ والنتائج التي تنشأ عن وقوع حادث ما أو اختبار فعلي لإحدى خطط الاستمرارية لإعداد تقرير حول الدروس المستفادة من هذا.", "3": "يطبق أسلوبًا منهجيًا على تطوير وتوثيق تفاصيل خطة الاستمرارية. يقوم بتوثيق خطط استمرارية العمل والتعافي من الكوارث. يدعم وضع خطة للاختبار، وتنفيذ تدريبات عملية على إدارة الاستمرارية.", "4": "يساهم في تطوير خطة إدارة الاستمرارية. يحدد نظم المعلومات والاتصالات التي تدعم عمليات العمل الهامة. ينسق ما بين عملية تحليل أثر العمل وتقييم المخاطر. ينسق عملية تخطيط وتصميم واختبار خطط الطوارئ.", "5": "يدير وضع وتنفيذ واختبار الخطط الخاصة بإدارة الاستمرارية. يدير العلاقات مع الأفراد والفرق المعنيين بعمليات العمل الهامة والنظم الداعمة لها. يقيم المخاطر الهامة ويحدد المجالات التي لها الأولوية في التطوير. يختبر خطط وإجراءات إدارة الاستمرارية لضمان معالجتها لمسألة التعرض للمخاطر وإمكانية الحفاظ على مستويات الاستمرارية المتفق عليها.", "6": "يضع الاستراتيجية الخاصة بإدارة الاستمرارية في المؤسسة بالكامل. يكفل الالتزام والتمويل والموارد من قبل المؤسسة بهدف إدارة الاستمرارية. يقود التدريبات الخاصة بإدارة الاستمرار. يُعرّف بالسياسة والحوكمة والنطاق والأدوار المتصلة بإدارة الاستمرار. يحدد من له الصلاحيات ومن سيُحاسب عن الإجراءات والقرارات التي تتخذ من أجل إدارة الاستمرارية."}}, {"code": "CPMG", "name": "إدارة القدرات", "desc": "ضمان امتلاك مكونات الخدمة للسعة والأداء الكافيين لتلبية احتياجات الأعمال الحالية والمخطط لها.", "levels": {"2": "يساعد في مراقبة سعة وأداء مكونات الخدمة تحت التوجيه والإشراف الروتيني. يجمع البيانات ويبلغ عنها حول استخدام الموارد ومقاييس القدرة. يدعم تنفيذ إجراءات وممارسات إدارة السعة.", "3": "يراقب سعة وأداء مكونات الخدمة، ويحدد المشكلات المحتملة ويصعدها حسب الضرورة. يطبق الإجراءات القياسية لإدارة الطلب والسعة. يشارك في أنشطة نمذجة السعة والتنبؤ بها، ويقدم المدخلات والتوصيات. يدعم تنفيذ أدوات وتقنيات إدارة السعة.", "4": "يراقب سعة مكون الخدمة ويبدأ الإجراءات اللازمة لحل أي عجز وفقًا للإجراءات المتفق عليها. يطبق التقنيات للتحكم في الطلب على مورد أو خدمة معينة. يساهم في نمذجة السعة والتخطيط باستخدام رؤى قائمة على البيانات. يدعم تصميم سعة مكون الخدمة.", "5": "يتولى إدارة أنشطة وضع نماذج السعة والتوقعات الخاصة بها باستخدام رؤى تعتمد على البيانات. يقوم على نحو استباقي باستعراض ومراجعة المعلومات جنبًا إلى جنب مع اتفاقيات مستوى الخدمة لتحديد أي مشاكل خاصة بالسعة ويحدد التغييرات المطلوبة. يقدم المشورة لدعم تصميم مكونات الخدمة بما في ذلك التصميم في إطار يراعي مرونة السعة وقابليتها للتوسع. يعمل مع ممثلي الشركات للموافقة على إجراء تعديلات قصيرة ومتوسطة الأجل ع", "6": "يقود تطوير وتنفيذ السياسات والاستراتيجيات لإدارة السعة والأداء لتلبية احتياجات العمل. يقود نمذجة السعة والتنبؤ بها خلال دورة التخطيط أو الميزانية للمؤسسة باستخدام رؤى قائمة على البيانات. يأخذ في الاعتبار العوامل الخارجية واتجاهات المجال. يضمن أن السياسات والمعايير لإدارة السعة مناسبة للغرض وحديثة ومطبقة بشكل صحيح. يقود التحسين المستمر في ممارسات إدارة السعة، مع التركيز على فعالية التكلفة وتحسين ال"}}, {"code": "USUP", "name": "إدارة الحوادث", "desc": "تنسيق الاستجابات لمجموعة متنوعة من الحوادث لتقليل التأثيرات السلبية واستعادة الخدمات بسرعة.", "levels": {"1": "يتبع الإجراءات المتفق عليها لتحديد الحوادث وتسجيلها وتصنيفها. يستخدم الأدوات والتقنيات المقدمة لدعم عملية إدارة الحوادث. يجمع المعلومات حسب التعليمات للمساعدة في حل الحوادث ويخصص الحوادث حسب التوجيهات. يساعد في مراقبة قوائم الحوادث وتصعيد المشكلات وفقًا للإجراءات المتبعة.", "2": "توفير التحقيقات الأولية وجمع المعلومات للتمكين من حل الحوادث وتخصيصها. يجمع المعلومات للتمكين من حل الحوادث وتخصيصها وفقًا للإجراءات المعمول بها. يصعّد الحوادث حسب الضرورة. يقدم المشورة للأشخاص المعنيين بالإجراءات المتخذة. يتواصل مع المستخدمين وأصحاب المصلحة لتقديم تحديثات حول حالة الحادث. يساعد في الحفاظ على السجلات والوثائق المتعلقة بالحوادث.", "3": "تحديد أولويات الحوادث وتشخيصها من خلال تطبيق الإجراءات والأدوات المتفق عليها. التحقيق في أسباب الحوادث والسعي إلى حلها. تصعيد الحوادث التي لم يتم حلها بعد إلى مستويات أعلى أو فرق متخصصة. التنسيق مع أصحاب المصلحة لضمان الحل في الوقت المناسب. تسهيل الاستعادة بعد حل الحوادث. توثيق النتائج وإبلاغها وإغلاق الحوادث التي تم حلها.", "4": "يراقب ويدير قوائم انتظار الحوادث لضمان التعامل مع الحوادث وفقًا للإجراءات ومستويات الخدمة. يساهم في تطوير إجراءات إدارة الحوادث واختبارها وتحسينها. يستخدم أدوات التحليل لتتبع الاتجاهات. يضمن توثيق الحوادث التي تم حلها وإغلاقها بشكل صحيح. يدعم أعضاء الفريق في الاستخدام الصحيح للإجراءات الخاصة بالحوادث.", "5": "المسؤول عن تشغيل عملية إدارة الحوادث. يدير اتصالات الحوادث، ويتأكد من أن جميع الأطراف على علم بالحوادث ودورها في العملية. يقود مراجعة الحوادث الكبرى ويبلغ أصحاب الخدمة بالنتائج. يضمن حل الحوادث ضمن أهداف الخدمة. يحلل المقاييس ويعد التقارير حول أداء عملية إدارة الحوادث. يقوم بتطوير وصيانة واختبار سياسة وإجراءات إدارة الحوادث. يضمن الامتثال للمتطلبات التنظيمية.", "6": "يشكل ويوجه استراتيجية إدارة الحوادث في المؤسسة. يضع السياسات والمعايير لإدارة الحوادث بما يتماشى مع أهداف المؤسسة. يوفر القيادة أثناء الحوادث الكبرى، وينسق بين الفرق الوظيفية المتعددة والشركاء الخارجيين. يتخذ قرارات رفيعة المستوى لتقليل التأثير وضمان التعافي السريع. يقود تطوير القدرات المؤسسية لإدارة الحوادث. يعزز التعاون المؤسسي ويضمن فهم عمليات إدارة الحوادث وتبنيها في جميع أنحاء المؤسسة."}}, {"code": "PBMG", "name": "إدارة المشاكل", "desc": "إدارة دورة حياة جميع المشكلات التي وقعت أو من الممكن أن تقع في أثناء تقديم إحدى الخدمات.", "levels": {"2": "يساعد في مهام إدارة المشكلات تحت الإشراف الروتيني. يساعد في توثيق المشكلات والحفاظ على السجلات ذات الصلة. يساعد في اكتشاف المشكلات وتسجيلها وتصنيفها وتحديد أولوياتها في الأنظمة والعمليات والخدمات.", "3": "يقوم بالتحقيق في المشاكل في الأنظمة والعمليات والخدمات. يساهم في تنفيذ الحلول واتخاذ التدابير الوقائية المتفق عليها.", "4": "يتخذ ويراقب الإجراءات الخاصة بدراسة المشكلات وحلها في النظم والعمليات والخدمات. يحدد طرق إصلاح وعلاج المشكلات. يتعاون مع الآخرين لتطبيق العلاجات والإجراءات الوقائية المتفق عليها. يدعم تحليل الأنماط والاتجاهات لتحسين عمليات إدارة المشكلات.", "5": "ضمان اتخاذ الإجراءات المناسبة لتوقع المشكلات في الأنظمة والخدمات، والتحقيق فيها وحلها. ضمان توثيق المشكلات بشكل كامل ضمن أنظمة الإبلاغ ذات الصلة. التمكين من تطوير حلول المشكلات. التنسيق بين عمليات تنفيذ العلاجات والتدابير الوقائية المتفق عليها. تحليل الأنماط والاتجاهات وتحسين عمليات إدارة المشكلات."}}, {"code": "CHMG", "name": "الرقابة على التغيير", "desc": "تقييم المخاطر المرتبطة بالتغيرات المقترحة وضمان مراقبة التغييرات التي تم إدخالها على المنتجات أو الخدمات أو النظم والتنسيق فيما بينها.", "levels": {"2": "يدير ويتتبع ويسجل ويصدر تقارير عن طلبات التغيير باستخدام الأدوات والتقنيات والعمليات المناسبة. يقدم المساعدة لتنفيذ التغييرات القياسية منخفضة المخاطر، وفقًا لإجراءات التحكم في التغيير المحددة.", "3": "يعمل على تطوير عمليات التغيير وتوثيقها وتنفيذها وفقاً لطلبات التغيير. يقوم بتطبيق عمليات وإجراءات ضبط التغيير. يستخدم أدوات وآليات وعمليات لإدارة طلبات التغيير وإعداد تقارير بشأنها.", "4": "يقيم ويحلل ويطور ويوثق وينفذ التغيرات بناء على مطالبات بالتغيير. يعمل على تطبيق العمليات والإجراءات التشغيلية من أجل إحكام الرقابة على التغيير. يطور ويطوع ويقوم بصيانة الأدوات الخاصة بإدارة دورة حياة المطالبات بالتغيير وإعداد تقارير عنها. يحدد المشكلات والإشكاليات ويوصي باتخاذ إجراءات تصحيحية.", "5": "يقود جهود تقييم وتحليل وتطوير وتوثيق وتنفيذ التغييرات. يضع خطط لتنفيذ مطالب التغيير التي تتسم بالتعقيد. يراجع عمليات التنفيذ المقترحة ويقيم المخاطر التي تتهدد سلامة البيئة الخاصة بالمنتج والخدمة. يضمن تطبيق اعتماد التغيير المناسب على التغييرات. يراجع مدى فاعلية تنفيذ التغيير. يحدد ويقيم ويدير استخدام أدوات وآليات وعمليات لمراقبة التغيير.", "6": "يحدد سياسة المؤسسة لإدارة التغيير في بيئات الاختبار والخدمات الفعلية. يعمل على إحكام الرقابة على المخاطر ومعالجتها. يقود جهود تطوير الأساليب الجديدة والمطورة للرقابة على التغيير. يقوم بقياس ومراقبة مدى الالتزام بالمعايير ويعمل على ضمان التطبيق المستمر للعملية في المؤسسة كلها."}}, {"code": "ASMG", "name": "إدارة الأصول", "desc": "إدارة دورة الحياة الكاملة للأصول بدءا من الحيازة إلى التشغيل إلى الصيانة وصولاً إلى الاستغناء عنها.", "levels": {"2": "يستخدم الإجراءات المتفق عليها لإنشاء سجل دقيق للأصول وتحديثه باستمرار. ينفذ الأنشطة المتعلقة بإدارة الأصول. يقوم بإعداد التقارير الاعتيادية لمساعدة أنشطة إدارة الأصول و عملية صنع القرار.", "3": "يطبق الأدوات والتقنيات والعمليات لإنشاء سجل دقيق للأصول وتحديثه باستمرار. يقوم بإعداد التقارير وإجراء التحليلات لدعم أنشطة إدارة الأصول والمساعدة في عملية صنع القرار.", "4": "يتحكم في الأصول في منطقة أو أكثر من المناطق المهمة لضمان إدارة دورة حياة الأصول بالكامل. ينتج ويحلل السجلات وتواريخ الأصول المصرح بها ويتحقق من أن كل هذه الأصول في حالة وموقع معروفين. يعمل على تسليط الضوء على الحالات المحتملة للأصول غير المصرح بها وحلها.", "5": "يدير ويحافظ على امتثال الخدمات فيما يخص جميع أصول تقنية المعلومات والخدمات، بما يتفق مع اشتراطات الأعمال والاشتراطات التنظيمية. يحدد المخاطر ذات الصلة ويقيّمها ويعرّف بها. يضمن قيام مراقبي الأصول وفرق البنية التحتية والمؤسسة ككل بالتنسيق وتحسين القيمة والالتزام بالمراقبة والامتثال القانوني بالشكل الصحيح.", "6": "يصوغ الاستراتيجية الخاصة بإدارة الأصول في المؤسسة بأكملها. يعرّف بالسياسة والحوكمة والنطاق والأدوار التي تدخل في عملية إدارة الأصول. يعزز الوعي بدور إدارة الأصول والالتزام به في تقديم الخدمات بصورة مستمرة اقتصادية وفعالة. يقدم المعلومات والمشورة حول المشكلات المعقدة لإدارة الأصول. يقوم بتقييم الآثار الناجمة عن اتخاذ قرارات بتحقيق أو تغيير أو مواصلة امتلاك أو استخدام أحد الأصول أو النظم أو الخدمات."}}, {"code": "SEAC", "name": "قبول الخدمة", "desc": "إدارة العملية للحصول على تأكيد رسمي باستيفاء معايير قبول الخدمة.", "levels": {"3": "يطبق معايير قبول الخدمة القياسية ويشارك في اختبار قبول الخدمة. يتعاون مع فرق التسليم لضمان تلبية المنتجات المقدمة للخدمة للمعايير المطلوبة. يوثق نتائج أنشطة قبول الخدمة ويعرّف بها. يحدد المشكلات أو حالات عدم المطابقة ويبلغ عنها، ويساعد في حلها.", "4": "يتعاون مع فرق التسليم للتأكد من أن المنتجات التي تم تطويرها تلبي معايير قبول الخدمة وتتوافق مع المعايير المطلوبة. يقيم المخاطر المتعلقة بقبول الخدمة ويقترح إجراءات لمعالجة المخاطر المحددة. يسهل التواصل بشأن معايير القبول بين الفرق للحفاظ على التوافق والاتساق طوال العملية. يقدم مدخلات لعمليات التحكم في التغيير.", "5": "يتعاون مع فرق التسليم لضمان إنتاج المنتجات الصحيحة في الوقت المناسب. يقود تقييم المنتجات المعقدة أو الضرورية المطلوبة للخدمة، ويضمن تلبيتها للاحتياجات التشغيلية الحالية والمستقبلية. يقود تقييمات المخاطر الشاملة لتحديد المخاطر وإعطائها الأولوية والتي قد تؤثر على جاهزية الخدمة. يقدم المشورة الموثوقة بشأن ممارسات قبول الخدمة. يقدم توصيات لتعزيز جاهزية الخدمة وتحسين عمليات قبول الخدمة. يقيم جودة مخرجا", "6": "يطور نهج المؤسسة لقبول الخدمة، ويتولى إدارة عملية التحول ويحدد معايير القبول لعمليات انتقال الخدمة. ويضمن أن أنشطة إدارة المخاطر تتماشى مع إطار إدارة المخاطر الأوسع للمؤسسة. ويعزز ويراقب مخرجات جودة المشروع لضمان ملاءمتها للغرض ومناسبتها للاستخدام ضمن الخدمات التشغيلية. ويشارك بنشاط مع أصحاب المصلحة لتعزيز الوعي والامتثال لخطط وعمليات جودة انتقال الخدمة. ويوافق على معايير قبول الخدمة مع فرق التسلي"}}, {"code": "IAMT", "name": "إدارة الهوية والوصول", "desc": "إدارة التحقق من الهوية وتصاريح الوصول ضمن الأنظمة والبيئات المؤسسية.", "levels": {"1": "ينفذ مهام إدارة الهوية والوصول الأساسية، بما في ذلك إدارة دورة حياة حساب المستخدم، تحت الإشراف. ويحافظ على السجلات الدقيقة ويتبع بروتوكولات إدارة الهوية والوصول المعمول بها.", "2": "يوفر المساعدة في عمليات إدارة الهوية والوصول، بما في ذلك التخصيص الآلي للأدوار وإدارة التحكم في الوصول. يشارك في إدارة دورة حياة هوية المستخدم، بما في ذلك إنشاء الحساب وحذفه. يسهل تشغيل أدوات إدارة الهوية والوصول وبوابات الخدمة الذاتية.", "3": "يدير خدمات إدارة الهوية والوصول القياسية، وينفذ السياسات ويحل المشكلات ذات الصلة. يدير عمليات المراقبة والتدقيق والتسجيل لأنظمة إدارة الهوية والوصول. يحقق في الاختراقات الأمنية البسيطة وفقًا للإجراءات المعمول بها المتعلقة بإدارة الهوية والوصول. يساعد المستخدمين في تحديد حقوقهم وامتيازاتهم في الوصول. يصمم وينفذ حلول إدارة الهوية والوصول البسيطة، ما يعزز أمان وصول المستخدم. يساهم في تحسين وتحسين عمل", "4": "تصميم وتنفيذ حلول إدارة الهوية والوصول المعقدة، مع التركيز على التحكم الآلي في الوصول وتخصيص الأدوار. الإشراف على دمج خدمات إدارة الهوية والوصول مع التقنيات الجديدة. تقديم الدعم المتخصص لعمليات إدارة الهوية والوصول المعقدة ودعم تنفيذ السياسات والمعايير. التعاون مع أصحاب المصلحة لمواءمة إدارة الهوية والوصول مع أهداف العمل واتجاهات الأمن الناشئة.", "5": "يقدم المشورة الموثوقة بشأن إدارة الهوية والوصول، ويضمن أن الخدمات تتوافق مع احتياجات العمل المتطورة وبروتوكولات الأمان وتدعمها. يدير مبادرات إدارة الهوية والوصول واسعة النطاق ويشرف على دمج خدمات إدارة الهوية والوصول مع التقنيات الجديدة، ما يعزز الأمان والكفاءة التشغيلية. يقود التخطيط التشغيلي لإدارة الهوية والوصول، ويتوقع الاتجاهات المستقبلية، ويجهز المؤسسة للنمو القابل للتوسع. يضمن امتثال أنظمة إ", "6": "يشكل ويحدد سياسات إدارة الهوية والوصول على مستوى المؤسسة، ويضمن التوافق مع استراتيجيات العمل ومتطلبات الأمان. يدعم الممارسات الجيدة، ويدافع عن حلول قوية ومبتكرة لإدارة الهوية والوصول عبر المؤسسة. يؤثر على حوكمة المؤسسة ويوجهها، ويدمج التقنيات الناشئة والامتثال التنظيمي في استراتيجيات إدارة الهوية والوصول. يراجع ويقدم المشورة بشأن جوانب إدارة الهوية والوصول وتداعيات مبادرات الأعمال الجديدة."}}, {"code": "SCAD", "name": "عمليات أمنية", "desc": "يدير التدابير الأمنية ويطبقها باستخدام الأدوات والمعلومات الاستخباراتية لحماية الأصول، وضمان الامتثال والسلامة التشغيلية.", "levels": {"1": "ينفذ مهام إدارة الأمان البسيطة. ويحافظ على السجلات والوثائق ذات الصلة، ما يساهم في الحفاظ على سلامة البيانات بشكل عام.", "2": "يستقبل الطلبات الروتينية للدعم الأمني ويستجيب لها. يحتفظ بالسجلات ويبلغ بفعالية بالإجراءات المتخذة. يساعد في التحقيق في المشكلات المتعلقة بأنظمة الأمان وحلها باستخدام أدوات وتقنيات التشخيص الأساسية. يوثق معلومات الحوادث والأحداث وينشئ تقارير عن الاستثناءات والأحداث الأمنية. يساهم في عمليات إعداد التقارير الإدارية.", "3": "يقوم بالتحقيق في الاختراقات الأمنية البسيطة باستخدام الإجراءات المعمول بها، ودمج أدوات وآيات التحليل. يقوم بأداء مهام أمنية تشغيلية غير قياسية تتكيف مع التقنيات المتطورة وبيئة التهديدات. يعالج ويحل مجموعة متنوعة من الأحداث الأمنية للحفاظ على سلامة النظام واستمرارية التشغيل.", "4": "يحافظ على عمليات الأمن التشغيلية ويحسنها. يتحقق من التعامل مع جميع طلبات الدعم وفقًا للبروتوكولات المعمول بها، بما في ذلك الأنظمة المستندة إلى السحابة والأنظمة الآلية. يقدم المشورة بشأن تنفيذ وإدارة الأمن المادي والإجرائي والفني الذي يشمل الأصول المادية والرقمية. يحقق في الاختراقات الأمنية من وفقًا للإجراءات المعمول بها باستخدام أدوات وتقنيات متقدمة ويوصي بالإجراءات التصحيحية اللازمة. يتيح التنفيذ", "5": "يشرف على إجراءات عمليات الأمن، ويضمن الالتزام والفعالية، بما في ذلك ممارسات أمن السحابة والاستجابات الآلية للتهديدات. يراجع الاختراقات الأمنية والثغرات الأمنية الفعلية أو المحتملة ويضمن التحقيق فيها بسرعة ودقة. يوصي بالإجراءات والتحسينات المناسبة على عملية الرقابة. يضمن سلامة واكتمال سجلات الأمن، ويضمن الدعم في الوقت المناسب والالتزام بالإجراءات المعمول بها. يساهم في إنشاء وصيانة سياسات ومعايير وإ", "6": "يطور سياسات ومعايير وعمليات وإرشادات شاملة للأمن المؤسسي في جميع أنحاء المشهد الرقمي. يضمن استمرارية وفعالية تنفيذ سياسات ومعايير الأمن، والتكيف مع التقنيات والتهديدات الناشئة. يراجع ويقدم المشورة بشأن الجوانب الأمنية للمبادرات التجارية الجديدة مع مراعاة الآثار المترتبة على المشهد الرقمي المتطور. يقود التخطيط الاستراتيجي لعمليات الأمن، ودمج مؤشرات المخاطر المتقدمة وعمليات الأتمتة لتعزيز مرونة المؤ"}}, {"code": "VUAS", "name": "تقييم مواطن الضعف", "desc": "تحديد وتصنيف الثغرات الأمنية في الشبكات والنظم والتطبيقات والحد من تأثيراتها أو القضاء عليها.", "levels": {"2": "يجري عمليات التقييم المعتادة لمواطن الضعف التي تتسم بدرجة تعقيد بسيطة باستخدام أدوات آلية أو شبه آلية. يقوم بتصعيد المشاكل إلى مستويات أعلى حسب الاقتضاء. يشارك في عملية توثيق النطاق وتقييم النتائج الخاصة بعمليات تقييم مواطن الضعف.", "3": "يتبع النُهُج المعيارية لإجراء عمليات تقييم لمواطن الضعف الأساسية في نظم المعلومات الصغيرة. يدعم إنشاء قوائم للأصول المعلوماتية والأصول التكنولوجية لاستخدامها في عمليات تقييم مواطن الضعف.", "4": "يجمع ويحلل الأدلة الخاصة بأصول المعلومات والتكنولوجيا لإجراء عملية تقييم لمواطن الضعف. يجري عمليات تقييم لمواطن الضعف وتحليل لأثر الأعمال في نظم المعلومات متوسطة التعقيد. يساهم في اختيار ونشر أدوات وآليات تقييم مواطن الضعف.", "5": "يخطط ويدير عمليات تقييم مواطن الضعف داخل المؤسسة. يقيم ويختار ويراجع أدوات وآليات تقدير مواطن الضعف. يقدم النصح والإرشاد القائمين على الخبرة لدعم تبني استخدام النُهُج المتفق عليها. يحصل على معلومات حول مواطن الضعف ويتخذ إجراءات مسترشدًا بها ويجري عمليات تقييم للمخاطر الأمنية وتحليل أثر الأعمال واعتماد نظم المعلومات المعقدة."}}, {"code": "DGFS", "name": "التحليل الجنائي الرقمي", "desc": "استعادة وفحص المواد الموجودة في الأجهزة الرقمية.", "levels": {"2": "يساعد في التحقيقات الجنائية الرقمية تحت الإشراف الروتيني. يدعم استعادة البيانات التالفة أو المحذوفة أو المخفية من الأجهزة الرقمية. يساعد في جمع المعلومات والأدلة الرقمية والحفاظ عليها وفقًا للبروتوكولات المعمول بها.", "3": "تطبيق أدوات وتقنيات التحليل الجنائي القياسية لفحص الأجهزة الرقمية. استعادة وتحليل البيانات التالفة أو المحذوفة أو المخفية من مصادر وأجهزة رقمية مختلفة. الحفاظ على سلامة الأدلة الرقمية وضمان التزام جمعها بمعايير المقبولية القانونية.", "4": "يصمم وينفذ عمليات التحليل الجنائي الرقمية المعقدة. يحدد متطلبات الأدوات والموارد الجنائية المتخصصة. يقدم إرشادات حول تقنيات استرداد البيانات المتقدمة وتحليل القطع الأثرية. يعالج ويحلل الأدلة الرقمية بما يتماشى مع سياسات المؤسسة والمعايير المتعارف عليها في المجال. يطور إجراءات التعامل مع التقنيات الناشئة في سياقات التحليل الجنائي. يساهم في التقارير الجنائية التي توضح النتائج الفنية.", "5": "يُجري التحريات لجمع وتحليل وتقديم النتائج بشكل صحيح، بما في ذلك الأدلة الرقمية، لكل من المهتمين بالأعمال والمهتمين بالجانب القانوني. يربط بين النتائج والتوصيات ويقدم نتائج التحليل الجنائي لأصحاب المصلحة. يخطط ويدير أنشطة التحليل الجنائي الرقمي داخل المؤسسة. يقدم المشورة كخبير بشأن التحليل الجنائي الرقمي. يساهم في تطوير سياسات ومعايير التحليل الجنائي الرقمي والمبادئ التوجيهية الخاصة به. يقيّم أدوات", "6": "يخطط ويقود نهج المؤسسة في مجال الطب الشرعي الرقمي. يضع السياسات والمعايير والمبادئ التوجيهية لكيفية إجراء المؤسسة للتحقيقات الجنائية الرقمية. يقود ويدير التحقيقات الجنائية الرقمية عالية المخاطر أو الكبيرة أو واسعة النطاق مع إشراك متخصصين إضافيين إذا لزم الأمر. يأذن بإصدار تقارير الطب الشرعي الرسمية. يتواصل مع أصحاب المصلحة الخارجيين بشأن المسائل الجنائية."}}, {"code": "PENT", "name": "اختبارات الاختراق", "desc": "اختبار مدى فاعلية الضوابط الأمنية بمحاكاة الأدوات والآليات الخاصة بمنفذي الهجوم المحتملين.", "levels": {"2": "يساعد في مهام اختبار الاختراق تحت الإشراف الروتيني. يدعم تنفيذ اختبارات الاختراق القياسية على الأنظمة والشبكات والتطبيقات. يساعد في توثيق نتائج الاختبار والنتائج والمخاطر الأمنية المحتملة وإعداد التقارير عنها.", "3": "يتبع النُهُج المعيارية في تصميم وتنفيذ الأنشطة المتعلقة باختبارات الاختراق. يجري أبحاثًا عن آليات الهجوم ويدرسها ويقدم توصيات بطرق التصدي لها. يحلل الأنشطة الخاصة باختبارات الاختراق ونتائجها والمشكلات والمخاطر التي تكتنفها ويعد تقارير بهذا الشأن.", "4": "يختار نُهُج اختبار ملائمة باستخدام التحليل الفني المتعمق للمخاطر ومواطن الضعف المعتادة. ينتج برامج نصية ومواد للاختبار وحزم اختبارات ويختبر الشبكات أو الأنظمة أو التطبيقات الجديدة والقائمة بالفعل. يقدم المشورة بشأن اختبارات الاختراق لدعم الآخرين. يسجل ويحلل الإجراءات والنتائج ويُعدّل الاختبارات إن لزم الأمر. يقدم تقارير حول التقدم المُحرز والعيوب والمخاطر والمشكلات المتعلقة بالمشروع ككل.", "5": "يخطط ويطبق اختبارات الاختراق في مجال أعمال محدد. يقدم رؤى موضوعية حول وجود مواطن ضعف ومدى فاعلية الوسائل الدفاعية وضوابط الحد من المخاطر. يتحمل مسؤولية إجراء الاختبارات بطريقة صحيحة وينسق ما بين عمليات إجراء هذه الاختبارات. يقدم مشورة وإرشاد قائمين على الخبرة حول جميع جوانب اختبارات الاختراق. يحدد الاحتياجات ويطبق نُهُجًا جديدة لاختبارات الاختراق. يشارك في وضع معايير الاختبارات الأمنية.", "6": "يحدد سياسة اختبارات الاختراق ويتحمل مسؤولية القيام بالعمليات الداعمة لها. يدير جميع اختبارات الاختراق التي تجري داخل المؤسسة. يقوم بتقييم وتقديم المشورة بشأن التطبيقات العملية لبدائل عملية الاختبار. يرسّخ القدرة على التحسين والابتكار المستمر في اختبارات الاختراق ويقود جهود تطبيق النُهُج الجديدة. يقيّم قدرات تطوير واختبار المورّدين. يدير العلاقات مع العملاء فيما يتعلق باختبارات الاختراق."}}, {"code": "RMGT", "name": "إدارة السجلات", "desc": "تخطيط وتنفيذ وإدارة دورة حياة السجلات المؤسسية بالكامل.", "levels": {"1": "يتبع إرشادات مفصلة لتأكيد استلام السجلات، بما في ذلك التقاط البيانات الوصفية الأساسية. يسلم السجلات الرقمية والمادية بما يتماشى مع الإجراءات المتفق عليها.", "2": "يساعد في جمع السجلات وتسليمها والاحتفاظ بها. يحدد البيانات الوصفية المناسبة ويطبقها. يستخدم الأساليب المعمول بها لنقل السجلات بين الصيغ أو الوسائط، وفقًا للسياسات والإجراءات المؤسسية. يحدد ويبلغ عن المخاطر أو المشكلات المحتملة المتعلقة بمعالجة المعلومات والأمان. يؤدي المهام الإدارية للحفاظ على إمكانية الوصول إلى السجلات وإمكانية استردادها وسلامتها وأمانها وحمايتها.", "3": "يحافظ على البيانات الوصفية الرئيسية للسجلات، بما في ذلك معلومات الملكية والفئة. يقوم بتكوين عناصر التحكم الروتينية لتقييد عمليات السجلات بالإجراءات المعتمدة فقط. يجري عمليات بحث روتينية عن السجلات المطلوبة لدعم الطلبات المعتمدة. يدعم المستخدمين في العثور على السجلات والوصول إليها. يستخدم أساليب أخلاقية وموثوقة لنقل البيانات بين الصيغ أو الوسائط، مع اتباع سياسات المؤسسة والوعي بالقضايا المحتملة عند", "4": "يدعم تنفيذ سياسات وممارسات إدارة السجلات بما في ذلك التخلص المعتمد من السجلات. يجري عمليات بحث معقدة أو حساسة عن السجلات لمعالجة الطلبات المعتمدة. يراقب ويقدم تقارير عن تنفيذ الضوابط الفعّالة لإدارة السجلات بما في ذلك البيانات الوصفية وضوابط الوصول. يوصي بإجراءات الإصلاح حسب الحاجة. يقدم النصح والمشورة للتمكين من تبني ممارسات إدارة السجلات المناسبة في جميع أنحاء المؤسسة.", "5": "ضمان تنفيذ سياسات إدارة السجلات التي تغطي جميع جوانب الاحتفاظ والتخلص منها. إدارة ضوابط الوصول إلى السجلات، بما في ذلك تفويض الوصول والموافقة على إصدار المعلومات الحساسة المحتملة. إجراء عمليات بحث معقدة في السجلات والإشراف عليها، والسعي للحصول على إرشادات قانونية عند الضرورة. مراجعة مقترحات التغيير الجديدة وتقديم المشورة المتخصصة بشأن إدارة السجلات. تقييم وإدارة المخاطر المتعلقة بالسجلات. المساهمة"}}, {"code": "DBAD", "name": "إدارة قواعد البيانات", "desc": "تركيب وتكوين ومراقبة وصيانة قواعد البيانات ومخازن البيانات، وضمان الأداء والأمان والتكيف مع التقنيات المتطورة.", "levels": {"2": "ينفذ الإجراءات التشغيلية، ويشغل نصوص التشغيل الآلي، ويؤدي أعمال الصيانة الروتينية ومراقبة قواعد البيانات. يضبط مهام التشغيل الآلي حسب التعليمات لتلبية المعايير التشغيلية لقواعد البيانات. يقدم تقارير عن أداء قاعدة البيانات، ويعالج المشكلات بشكل مباشر عندما يكون ذلك ممكنًا، أو يصعدها إلى آخرين لحلها.", "3": "يقوم بتزويد قواعد البيانات وتثبيتها وتكوينها وضمان صيانتها وموثوقيتها. يراقب قواعد البيانات بحثًا عن أحداث التحميل والأداء والأمان. يقدم تقارير عن المقاييس ويحل المشكلات التشغيلية. ينفذ الإجراءات التشغيلية القياسية، بما في ذلك النسخ الاحتياطية لقواعد البيانات واستعادتها. يقوم بأتمتة مهام إدارة قواعد البيانات الروتينية وفقًا للمواصفات باستخدام البرامج النصية والأدوات القياسية.", "4": "يطبق الخبرة الفنية للحفاظ على قواعد البيانات وتحسينها، وتنفيذ التحديثات واستخدام أدوات الأتمتة. يقوم بتكوين الأدوات و/أو إنشاء البرامج النصية لأتمتة مهام قاعدة البيانات. يحافظ على الإجراءات التشغيلية ويتحقق من اتباعها، بما في ذلك الامتثال لسياسات الأمان. يستخدم أدوات إدارة قاعدة البيانات لمراقبة إحصائيات التحميل والأداء. يحقق في مشكلات التشغيل والأمن في قاعدة البيانات ويمكّن من حلها. يقدم التقارير", "5": "يوفر القيادة الفنية لتحسين أداء قواعد البيانات. يقود جهود تبني الأدوات والعمليات الآلية لإدارة قواعد البيانات وتسليمها بشكل فعال. يشرف على التخطيط فهرس موارد التعلم والتطوير. يدعم تنظيم فعاليات التعلم من خلال المساعدة في تنسيق الخدمات اللوجستية والجداول الزمنية والتواصل مع الحاضرين. يدعم جمع وتنظيم البيانات حول أنشطة التعلم والتطوير للمساعدة في تقييم فعاليتها.", "4": "يساهم في التطوير والتحديث المستمر لدليل موارد التعلم والتطوير. يستخدم البيانات لتحليل وتقييم مدى فاعلية أنشطة التعلم/ الأنشطة التعليمية. يتولى الحجز والتنظيم في المحافل الخاصة بالتعلم. يقوم بتحديث سجلات التدريب وضبطها، بما في ذلك الحصول على الشهادات والاعتمادات.", "5": "يقوم بإدارة توفير أنشطة التعلم والتطوير، ويضمن الاستخدام الأفضل للموارد. يقوم بصيانة دليل التعلم وأنشطة التطوير ويقوم بنشرها والترويج لها. يضمن تحديث الدورات التدريبية واعتمادها (عند الحاجة). يقوم بترتيب المرافق والجداول الزمنية مع مقدمي خدمات التعلم والتطوير حسبما يكون ذلك مناسبا. يستخدم البيانات في تقييم وتحسين درجة فاعلية أنشطة التعلم أو الأنشطة التعليمية.", "6": "يحدد برامج التعلم والتطوير وآليات التنفيذ المطلوبة لتنمية مهارات العاملين بما يتوافق مع احتياجات العمل. يحدد مسارات الاعتماد والتأهيل الصحيحة التي تنطبق على الأفراد داخل المؤسسة. يقيّم مخرجات التعلم. يقوم بإدارة عملية تطوير وتوفير جميع أنشطة التعلم، مع مراعاة الأهداف الاستراتيجية للمؤسسة.", "7": "يوجه عملية تطوير وتنفيذ استراتيجية التعلم والتطوير بالمؤسسة بما يتواءم مع احتياجات العمل. يقود جهود توفير خبرات التعلم والتطوير والإرشاد والنظم اللازمة لتنفيذ الخطط الاستراتيجية والتشغيلية. يوفر الموارد المؤسسية لتنفيذ استراتيجية التعلم والتطوير. يحدد الفرص السانحة لإقامة علاقات استراتيجية مع المورّدين والشركاء."}}, {"code": "TMCR", "name": "تصميم وتطوير التعلم", "desc": "تصميم وتطوير الموارد لنقل المعارف وتطوير المهارات وتغيير السلوكيات.", "levels": {"2": "يساعد في تصميم وتطوير مهام التعلم تحت الإشراف الروتيني. يدعم إنشاء وصيانة مواد وموارد التعلم. يساعد في توثيق وتنظيم محتوى وبيئات التعلم.", "3": "يقوم بتصميم وإعداد وتخصيص وتحديث المواد والموارد التعليمية من أجل تحقيق النتائج المتفق عليها، واستيفاء متطلبات الاعتماد إذا اقتضت الحاجة. يساعد في تصميم البيئات التعليمية وتهيئتها واختبارها.", "4": "يحدد محتوى وهيكل المواد الخاصة
